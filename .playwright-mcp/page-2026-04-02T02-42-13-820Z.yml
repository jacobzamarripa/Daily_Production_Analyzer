                      - generic [ref=f2e129]: Run Review — Prompts for a date, processes daily vendor files, and loads anomalies into the queue.
                    - generic [ref=f2e130]:
                      - generic [ref=f2e131]: "3"
                      - generic [ref=f2e132]: Admin Checks — Open the right-side Review Hub to clear Status Mismatches, verify Special Crossings, and log missing BOMs.
                    - generic [ref=f2e133]:

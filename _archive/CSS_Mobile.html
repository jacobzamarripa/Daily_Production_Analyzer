<!-- MOBILE/AGENT NOTES: WS12 migration target. These styles override _styles_mobile.html -->
<!--   for the detail view only. When WS12 completes, migrate to @media (max-width: 768px) -->
<!--   blocks in _styles_components.html and _styles_layout.html. -->

<style>
  /* ── PHASE 3: DETAIL VIEW — Sticky layout for one-handed use ── */

  /* Override tab-panel scroll so the inner detail-layout handles scrolling */
  #tab-detail {
    overflow: hidden;
    padding: 0;
    display: flex;
    flex-direction: column;
  }

  /* detail-shell fills the panel, disables its own scroll gap */
  .detail-shell {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    gap: 0;
    min-height: 0;
    padding-bottom: 0;
  }

  /* Root flex column that owns the three zones */
  .detail-layout {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
  }

  /* ── ZONE 1: Sticky compact header ── */
  .detail-sticky-header {
    flex-shrink: 0;
    padding: 10px 16px 8px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .detail-header-meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .detail-sticky-header .detail-back-btn {
    padding: 0;
    min-height: 32px;
    font-size: 13px;
  }

  /* Compact countdown in header (smaller than standalone card) */
  .detail-sticky-header .detail-countdown {
    min-width: auto;
    padding: 6px 10px;
    border-radius: 12px;
    text-align: right;
  }

  .detail-sticky-header .detail-countdown__value {
    font-size: 18px;
  }

  .detail-header-id-block {
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
  }

  .detail-header-id-block .detail-eyebrow {
    font-size: 10px;
    font-weight: 800;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .detail-header-id-block .detail-title {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--text-main);
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .detail-header-id-block .detail-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .detail-sticky-header .detail-pill-row {
    flex-wrap: wrap;
  }

  /* ── ZONE 2: Scrollable content body ── */
  .detail-scroll-body {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    padding: 12px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Sections inside scroll body lose the outer shell card treatment */
  .detail-scroll-body .detail-section,
  .detail-scroll-body .detail-header-card {
    border-radius: 18px;
  }

  /* ── ZONE 3: Sticky thumb-reach action bar ── */
  .detail-action-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    padding-bottom: calc(10px + var(--tabbar-height, 76px) + var(--safe-bottom, 34px));
    border-top: 1px solid var(--border);
    background: var(--bg);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  /* Prev / Next icon buttons */
  .detail-action-bar .detail-nav-btn {
    flex-shrink: 0;
    width: 44px;
    height: 48px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }

  .detail-action-bar .detail-nav-btn:disabled {
    opacity: 0.28;
    cursor: default;
  }

  .detail-action-bar .detail-nav-btn:not(:disabled):active {
    background: var(--card-bg-2);
  }

  /* Skip: secondary, flex 1 */
  .detail-action-bar .detail-action-btn--skip {
    flex: 1;
    height: 48px;
    font-size: 14px;
  }

  /* Commit: primary CTA, flex 2 — biggest thumb zone */
  .detail-action-bar .detail-action-btn--commit {
    flex: 2;
    height: 48px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.01em;
  }

  /* ── INLINE GEMINI DRAFT SECTION (within PM Note) ── */
  .detail-gemini-inline {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .detail-gemini-inline .btn-gemini-draft {
    width: 100%;
    height: 46px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #6d28d9 0%, #8b5cf6 100%);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s, transform 0.1s;
    box-shadow: 0 4px 12px rgba(109, 40, 217, 0.3);
  }

  .detail-gemini-inline .btn-gemini-draft:not(:disabled):active {
    opacity: 0.85;
    transform: scale(0.98);
  }

  .detail-gemini-inline .btn-gemini-draft:disabled {
    opacity: 0.55;
    cursor: default;
  }

  /* Spinner (hidden by default, shown while loading) */
  .detail-gemini-inline .btn-gemini-draft .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: mbl-spin 0.65s linear infinite;
    flex-shrink: 0;
  }

  @keyframes mbl-spin {
    to { transform: rotate(360deg); }
  }

  .detail-gemini-inline .btn-gemini-draft.loading .spinner { display: block; }
  .detail-gemini-inline .btn-gemini-draft.loading .btn-label { opacity: 0.6; }

  /* Draft output panel */
  .detail-gemini-inline .detail-draft-output {
    display: none;
    background: var(--card-bg-2, var(--card-bg));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 15px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-main);
    white-space: pre-wrap;
  }

  .detail-gemini-inline .detail-draft-output.visible {
    display: block;
  }

  /* Save note row */
  .detail-gemini-inline .detail-save-note-row {
    display: flex;
    justify-content: flex-end;
  }

  .detail-gemini-inline .btn-save-note {
    padding: 9px 22px;
    height: 40px;
    border-radius: 10px;
    border: none;
    background: var(--health-ok, #22c55e);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }

  .detail-gemini-inline .btn-save-note:disabled { opacity: 0.5; }

  /* ── Stage button inside PM Note (less prominent in new layout) ── */
  .detail-actions--meta {
    justify-content: flex-start;
    margin-bottom: 4px;
  }

  .detail-actions--meta .detail-action-btn--stage {
    flex: none;
    padding: 8px 18px;
    height: 38px;
    font-size: 12px;
  }
</style>

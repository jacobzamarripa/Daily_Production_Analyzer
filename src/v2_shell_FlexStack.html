<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
/* ============================================================
   V2 SHELL: FlexStack
   ROLE: Mobile adaptive shell — spatial composition for portrait
   BUILD ON: _styles_responsive.html (WS16 Phase 2 mobile work)
   DO NOT: redefine color tokens, font families, transition speeds
   ============================================================ */

/* --- V2 Geometry Contract (required, do not remove) --- */
:root {
  --v2-shell-inset: 12px;
  --v2-shell-radius: 24px;
  --v2-shell-bg: #FFFFFF;
  --v2-shell-top-offset: env(safe-area-inset-top, 0px);
  --v2-shell-bottom-clearance: 84px;
  --v2-shell-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);

  /* Shared mobile tokens (inherit from _styles_base.html) */
  --m-touch: 56px;
  --m-nav-h: 52px;
  --m-dock-h: 64px;
  --m-gutter: 16px;
}

body.v2-shell-flexstack {
  /* Override desktop height lock */
  height: -webkit-fill-available;
  overflow: hidden;
  overscroll-behavior: contain;

  /* Force full viewport ownership */
  display: flex;
  flex-direction: column;

  /* Readable base scale for data-dense modules */
  font-size: 14px;
}

/* --- FlexStack Root Layout --- */
.v2-flexstack-viewport {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
  background: var(--bg);
  overflow: hidden;
}

/* --- Top Navigation (Fixed) --- */
.v2-flexstack-topnav {
  position: relative;
  z-index: 100;
  height: var(--m-nav-h);
  padding-top: var(--v2-shell-top-offset);
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding-left: var(--m-gutter);
  padding-right: var(--m-gutter);
  flex-shrink: 0;
}

.v2-flexstack-topnav-brand {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text-main);
  flex: 1;
}

.v2-flexstack-topnav-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.v2-flexstack-topnav-action {
  width: 36px;
  height: 36px;
  border: none;
  background: var(--bg);
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: background var(--transition-fast);
}

.v2-flexstack-topnav-action:active {
  background: var(--border);
}

/* --- Main Content Panel (Flexible Scroll Owner) --- */
.v2-flexstack-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* Queue/Detail/Gantt/Deck views render here */
.v2-flexstack-content > div {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* --- Card Shell (Applies 12px inset + rounded corners) --- */
.v2-flexstack-card {
  position: relative;
  display: flex;
  flex-direction: column;
  margin: var(--v2-shell-inset);
  border-radius: var(--v2-shell-radius);
  background: var(--card-bg);
  box-shadow: var(--v2-shell-shadow);
  overflow: hidden;
  flex: 1;
}

/* Scroll container inside card */
.v2-flexstack-card-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  /* Single scroll owner */
}

/* Data-heavy views (Gantt, Grid) go full-bleed */
.v2-flexstack-card.v2-fs-full-bleed {
  margin: 0;
  border-radius: 0;
  box-shadow: none;
}

/* --- Queue List Container --- */
.v2-flexstack-queue {
  display: flex;
  flex-direction: column;
}

.v2-flexstack-queue-header {
  padding: 12px var(--m-gutter);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.v2-flexstack-queue-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.3px;
  color: var(--text-muted);
  text-transform: uppercase;
}

.v2-flexstack-queue-count {
  display: inline-block;
  margin-left: 6px;
  padding: 2px 6px;
  background: var(--border);
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
}

.v2-flexstack-queue-items {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding-bottom: 12px;
}

/* Queue item (reuses _module_queue_state rendering) */
.v2-flexstack-queue-item {
  padding: 12px var(--m-gutter);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition-fast);
}

.v2-flexstack-queue-item:last-child {
  border-bottom: none;
}

.v2-flexstack-queue-item:active {
  background: var(--border);
}

/* --- Detail Panel --- */
.v2-flexstack-detail {
  display: flex;
  flex-direction: column;
  padding: var(--m-gutter);
  gap: 16px;
}

.v2-flexstack-detail-hero {
  flex-shrink: 0;
}

.v2-flexstack-detail-hero-id {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.4px;
  line-height: 1.1;
  color: var(--text-main);
  margin-bottom: 8px;
}

.v2-flexstack-detail-hero-meta {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  line-height: 1.4;
}

.v2-flexstack-detail-section {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.v2-flexstack-detail-section-header {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.4px;
  color: var(--text-muted);
  text-transform: uppercase;
  padding-bottom: 4px;
}

/* --- Bottom Dock (Fixed) --- */
.v2-flexstack-dock {
  position: relative;
  z-index: 90;
  height: var(--m-dock-h);
  padding-bottom: env(safe-area-inset-bottom);
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-left: var(--m-gutter);
  padding-right: var(--m-gutter);
  flex-shrink: 0;
  flex-wrap: wrap;
  gap: 8px;
}

.v2-flexstack-dock-btn {
  flex: 1;
  min-width: 44px;
  height: 44px;
  border: none;
  background: var(--bg);
  border-radius: 12px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-main);
  transition: background var(--transition-fast), transform var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
}

.v2-flexstack-dock-btn:active {
  background: var(--border);
  transform: scale(0.96);
}

.v2-flexstack-dock-btn.primary {
  background: var(--accent);
  color: #ffffff;
}

.v2-flexstack-dock-btn.primary:active {
  background: color-mix(in srgb, var(--accent) 85%, black);
}

/* --- Motion Classes --- */
/* Push: Queue → Detail (horizontal) */
.v2-flexstack-content.v2-push-in {
  animation: v2-push-in 0.2s ease forwards;
}

@keyframes v2-push-in {
  from {
    opacity: 0;
    transform: translateX(100%);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

.v2-flexstack-content.v2-push-out {
  animation: v2-push-out 0.15s ease forwards;
}

@keyframes v2-push-out {
  from {
    opacity: 1;
    transform: translateX(0);
  }
  to {
    opacity: 0;
    transform: translateX(100%);
  }
}

/* Lift: Admin sheet from bottom */
.v2-flexstack-admin-sheet {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(15, 23, 42, 0.34);
  display: flex;
  align-items: flex-end;
  opacity: 0;
  animation: v2-lift-in 0.2s ease forwards;
}

@keyframes v2-lift-in {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

.v2-flexstack-admin-sheet.v2-lift-out {
  animation: v2-lift-out 0.15s ease forwards;
}

@keyframes v2-lift-out {
  from {
    opacity: 1;
  }
  to {
    opacity: 0;
  }
}

.v2-flexstack-admin-sheet-panel {
  width: 100%;
  max-height: 85vh;
  background: var(--card-bg);
  border-radius: 20px 20px 0 0;
  display: flex;
  flex-direction: column;
  animation: v2-slide-up 0.2s ease forwards;
}

@keyframes v2-slide-up {
  from {
    transform: translateY(100%);
  }
  to {
    transform: translateY(0);
  }
}

.v2-flexstack-admin-sheet.v2-lift-out .v2-flexstack-admin-sheet-panel {
  animation: v2-slide-down 0.15s ease forwards;
}

@keyframes v2-slide-down {
  from {
    transform: translateY(0);
  }
  to {
    transform: translateY(100%);
  }
}

/* Fade: Internal state changes */
.v2-flexstack-fade-in {
  animation: v2-fade-in 0.15s ease forwards;
}

@keyframes v2-fade-in {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

/* --- Overrides for shared modules --- */

/* Queue module inside FlexStack */
.v2-shell-flexstack .inbox-sidebar {
  width: 100% !important;
  min-width: 0 !important;
  max-width: 100% !important;
  border: none !important;
  background: transparent !important;
  padding: 0 !important;
  margin: 0 !important;
}

.v2-shell-flexstack .inbox-header {
  padding: 12px var(--m-gutter) !important;
  position: static !important;
  background: transparent !important;
  border-bottom: 1px solid var(--border) !important;
}

.v2-shell-flexstack .inbox-list {
  padding: 0 !important;
}

.v2-shell-flexstack .inbox-list > div {
  padding: 12px var(--m-gutter) !important;
  border-bottom: 1px solid var(--border) !important;
  cursor: pointer;
  transition: background var(--transition-fast);
}

.v2-shell-flexstack .inbox-list > div:active {
  background: var(--border);
}

.v2-shell-flexstack .inbox-list > div:last-child {
  border-bottom: none !important;
}

/* Detail pane */
.v2-shell-flexstack .reading-pane {
  width: 100% !important;
  padding: 0 !important;
  display: flex;
  flex-direction: column;
}

.v2-shell-flexstack .pane-content {
  padding: var(--m-gutter) !important;
  overflow-y: auto !important;
  flex: 1;
}

/* Admin tray */
.v2-shell-flexstack .admin-pane {
  position: fixed !important;
  inset: 0 !important;
  background: rgba(15, 23, 42, 0.34) !important;
  z-index: 200 !important;
  display: flex !important;
  flex-direction: column !important;
  align-items: flex-end !important;
  padding: 0 !important;
}

.v2-shell-flexstack .admin-panel {
  width: 100% !important;
  max-height: 85vh !important;
  background: var(--card-bg) !important;
  border-radius: 20px 20px 0 0 !important;
  flex: 1 !important;
  overflow-y: auto !important;
}

/* Dark mode */
body.dark-mode.v2-shell-flexstack {
  --v2-shell-bg: #1e1e24;
}

body.dark-mode.v2-shell-flexstack .v2-flexstack-topnav,
body.dark-mode.v2-shell-flexstack .v2-flexstack-dock {
  background: var(--card-bg);
}

</style>
</head>
<body class="v2-shell-flexstack">

  <!-- Shared design tokens — do not move or remove -->
  <?!= include('_styles_base') ?>
  <?!= include('_styles_responsive') ?>

  <!-- Main viewport -->
  <div class="v2-flexstack-viewport">

    <!-- Top Navigation -->
    <div class="v2-flexstack-topnav">
      <div class="v2-flexstack-topnav-brand">Omni PMO</div>
      <div class="v2-flexstack-topnav-actions">
        <button class="v2-flexstack-topnav-action" onclick="toggleDarkMode()" title="Theme">🌙</button>
        <button class="v2-flexstack-topnav-action" onclick="triggerRunReview()" title="Run Review">▶</button>
      </div>
    </div>

    <!-- Content Panel -->
    <div class="v2-flexstack-content">
      <div class="v2-flexstack-card" id="v2-content-card">
        <div class="v2-flexstack-card-scroll" id="v2-content-scroll">
          <!-- Queue list or detail or gantt renders here -->
          <div id="v2-content-inner"></div>
        </div>
      </div>
    </div>

    <!-- Bottom Dock -->
    <div class="v2-flexstack-dock">
      <button class="v2-flexstack-dock-btn" onclick="switchWorkspaceView('detail')" title="Detail">◻</button>
      <button class="v2-flexstack-dock-btn" onclick="switchWorkspaceView('gantt')" title="Gantt">☰</button>
      <button class="v2-flexstack-dock-btn" onclick="toggleAdminPanel()" title="Admin">⚙</button>
      <button class="v2-flexstack-dock-btn primary" onclick="triggerQBSync()" title="Sync">⟳</button>
    </div>

  </div>

  <!-- Shared brain — DO NOT MODIFY these files, only include them -->
  <?!= include('_registry') ?>
  <?!= include('_state_queue') ?>
  <?!= include('_state_router') ?>
  <?!= include('_state_session') ?>

  <!-- Shared modules and utilities -->
  <?!= include('_utils_shared') ?>
  <?!= include('_utils_notifications') ?>
  <?!= include('_module_queue_state') ?>
  <?!= include('_module_router') ?>
  <?!= include('_module_admin') ?>
  <?!= include('_module_webapp_core') ?>

  <script>
    // Register this variant with the shared router — required
    setV2Variant('FlexStack');

    // FlexStack shell init handler
    window.v2FlexStackInit = function() {
      console.log('FlexStack shell initialized');

      // Ensure single scroll owner
      const scrollContainer = getEl('v2-content-scroll');
      if (scrollContainer) {
        scrollContainer.addEventListener('touchmove', function(e) {
          e.stopPropagation();
        }, { passive: true });
      }
    };

    // Hook into app bootstrap
    if (typeof registerV2ShellHook === 'function') {
      registerV2ShellHook('FlexStack', v2FlexStackInit);
    }

    // Set default workspace view
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', v2FlexStackInit);
    } else {
      v2FlexStackInit();
    }
  </script>

</body>
</html>

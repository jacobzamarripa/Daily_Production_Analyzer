<script>
// ============================================================
// FILE: _module_command_view.html
// ROLE: Renders the Command View workspace, unifying system and DB logs
// DEPENDS ON: allGlobalLogs, allSystemLogs, _utils_shared.html, _render_status_pill.html
// ============================================================

let currentCommandFilter = 'all';
let currentCommandSearch = '';
let currentBriefTimeframe = 'lifetime';

function isStatusField(fieldName) {
    let f = String(fieldName || '').toLowerCase();
    return f.includes('status') || f.includes('stage') || f.includes('phase');
}

function isDateField(fieldName) {
    let f = String(fieldName || '').toLowerCase();
    return f.includes('date') || f.includes('ofs') || f.includes('target') || f.includes('start') || f.includes('complete');
}

function buildUnifiedCommandFeed() {
    let unified = [];
    let dbLogs = (typeof allGlobalLogs !== 'undefined' && allGlobalLogs) ? allGlobalLogs : [];
    let sysLogs = (typeof allSystemLogs !== 'undefined' && allSystemLogs) ? allSystemLogs : [];

    // Sort DB logs chronologically first to allow flow inference
    let sortedDb = dbLogs.slice().sort((a,b) => (a.timestampObj || 0) - (b.timestampObj || 0));
    let lastKnownVal = {}; 

    sortedDb.forEach(function(log) {
        let ts = log.timestampObj || 0;
        if (!ts && log.time) ts = new Date(log.time).getTime();
        
        let projectKey = log.fdh || 'UNKNOWN';
        let fieldKey = log.type || 'Update';
        let historyKey = projectKey + '::' + fieldKey;
        
        let oldVal = lastKnownVal[historyKey] || null;
        let newVal = String(log.val || '').replace(/(?: \d{2}:\d{2}:\d{2} GMT.*)/, '');
        
        lastKnownVal[historyKey] = newVal;

        unified.push({
            id: 'db-' + ts + '-' + Math.random(),
            source: 'db',
            timeObj: ts,
            timeDisplay: log.time,
            title: String(log.fdh || 'Database Change'),
            user: String(log.user || 'System'),
            description: newVal,
            oldValue: oldVal,
            meta: 'DATABASE',
            fdh: projectKey,
            changeType: fieldKey,
            isStatus: isStatusField(fieldKey),
            isDate: isDateField(fieldKey)
        });
    });

    sysLogs.forEach(function(log) {
        let ts = log.timestampObj || 0;
        if (!ts && log.time) ts = new Date(log.time).getTime();
        let desc = String(log.val || '');
        let category = 'sys';
        let meta = 'SYSTEM';
        if (desc.includes('🤖')) { category = 'auto'; meta = 'AUTOMATION'; }
        else if (desc.includes('📊') || desc.includes('📁') || desc.includes('📂') || desc.includes('🧹') || desc.includes('⚡') || desc.includes('🔄')) { category = 'job'; meta = 'ENGINE'; }
        else if (desc.includes('❌') || desc.includes('⚠️') || desc.includes('CRASH') || desc.includes('💻')) { category = 'error'; meta = 'CRITICAL'; }
        unified.push({
            id: 'sys-' + ts + '-' + Math.random(),
            source: category,
            timeObj: ts,
            timeDisplay: log.time,
            title: 'System Event',
            user: 'App Backend',
            description: desc,
            meta: meta
        });
    });

    unified.sort(function(a, b) { return b.timeObj - a.timeObj; });
    return unified;
}

function filterCommandFeed(filterType, btn) {
    currentCommandFilter = filterType || 'all';
    if (btn) {
        let zone = document.getElementById('dock-command-zone');
        if (zone) {
            zone.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    }
    renderCommandView();
}

function setCommandBriefTimeframe(val) {
    currentBriefTimeframe = val;
    renderCommandView(); 
}

function searchCommandFeed(query) {
    currentCommandSearch = String(query || '').toLowerCase();
    renderCommandView();
}

function closeCommandInspector() {
    let panel = document.getElementById('command-inspector-panel');
    let overlay = document.getElementById('command-inspector-overlay');
    if (panel) panel.classList.remove('is-visible');
    if (overlay) overlay.classList.remove('is-visible');
}

function openCommandInspector(title, subtitle, logs) {
    let panel = document.getElementById('command-inspector-panel');
    let overlay = document.getElementById('command-inspector-overlay');
    if (!panel) return;

    let html = `
        <div class="inspector-header">
            <div class="inspector-title-stack">
                <h2>${esc(title)}</h2>
                <div class="inspector-subtitle">${esc(subtitle)}</div>
            </div>
            <button class="btn-icon" onclick="closeCommandInspector()" style="font-size:24px;">×</button>
        </div>
        <div class="inspector-body">
    `;

    if (!logs || logs.length === 0) {
        html += '<div class="digest-panel-empty">No historical data available.</div>';
    } else {
        logs.forEach(function(l) {
            html += `
                <div class="inspector-log-card">
                    <span class="inspector-log-time">${esc(l.time)}</span>
                    <div class="inspector-log-msg">${esc(l.val)}</div>
                </div>
            `;
        });
    }

    html += '</div>';
    panel.innerHTML = html;
    panel.classList.add('is-visible');
    if (overlay) overlay.classList.add('is-visible');
}

function inspectFdhHistory(fdhId) {
    let dbLogs = (typeof allGlobalLogs !== 'undefined' && allGlobalLogs) ? allGlobalLogs : [];
    let history = dbLogs.filter(l => String(l.fdh) === fdhId).map(l => ({
        time: l.time,
        val: `${l.type}: ${l.val}`
    })).reverse();
    openCommandInspector(fdhId, 'Project Audit Trail', history);
}

function inspectUserHistory(user) {
    let dbLogs = (typeof allGlobalLogs !== 'undefined' && allGlobalLogs) ? allGlobalLogs : [];
    let history = dbLogs.filter(l => String(l.user) === user).map(l => ({
        time: l.time,
        val: `[${l.fdh}] ${l.type}: ${l.val}`
    })).reverse();
    openCommandInspector(user, 'User Activity Log', history);
}

function inspectDateHistory(dateStr) {
    let fullFeed = buildUnifiedCommandFeed();
    let day = String(dateStr).split(' ')[0].trim();
    let history = fullFeed.filter(l => String(l.timeDisplay).startsWith(day)).map(l => ({
        time: l.timeDisplay,
        val: l.description
    }));
    openCommandInspector(day, 'Daily Event Log', history);
}

function renderStatusPillInCommand(val) {
    if (!val || val === 'null' || val === 'undefined') return '<span class="db-val-txt">EMPTY</span>';
    let cls = (typeof getQBStatusClass === 'function') ? getQBStatusClass(val, val, false) : 'pill-default';
    return `<span class="glass-pill ${cls}" style="font-size:10px; padding:3px 10px; width:fit-content;">${esc(val)}</span>`;
}

function updateBriefBadge() {
    var btn = document.getElementById('view-btn-brief');
    if (!btn) return;
    var newLogs = (window.allGlobalLogs || []).filter(function(l) {
        return (l.timestampObj || 0) > lastBriefSeenTimestamp;
    });
    var badge = btn.querySelector('.btn-badge');
    if (newLogs.length > 0) {
        if (!badge) {
            badge = document.createElement('span');
            badge.className = 'btn-badge';
            btn.appendChild(badge);
        }
        badge.innerText = newLogs.length > 99 ? '99+' : newLogs.length;
        badge.style.display = 'flex';
    } else if (badge) {
        badge.style.display = 'none';
    }
}
window.updateBriefBadge = updateBriefBadge;

function renderCommandShoulderBrief() {
    let fiberStats = (window._lastDashboardPayload && window._lastDashboardPayload.fiberStats) || {};
    let now = new Date();
    
    let html = `
        <div class="command-leaderboard-box">
            <div class="leaderboard-header">
                <div class="leaderboard-title">
                    <span class="leaderboard-title-main">Leaderboard</span>
                    <span class="leaderboard-title-sub">Production Velocity</span>
                </div>
                <select class="brief-select-glass" onchange="setCommandBriefTimeframe(this.value)">
                    <option value="lifetime" ${currentBriefTimeframe === 'lifetime' ? 'selected' : ''}>Lifetime</option>
                    <option value="today" ${currentBriefTimeframe === 'today' ? 'selected' : ''}>Current</option>
                    <option value="recent7" ${currentBriefTimeframe === 'recent7' ? 'selected' : ''}>7 Days</option>
                    <option value="month" ${currentBriefTimeframe === 'month' ? 'selected' : ''}>Month</option>
                </select>
            </div>
            <div class="leaderboard-list">
    `;

    if (Object.keys(fiberStats).length === 0) {
        html += '<div class="digest-panel-empty" style="font-size:10px;">No production data detected.</div>';
    } else {
        var sortedVendors = Object.keys(fiberStats).sort(function(a, b) {
            var valA = fiberStats[a][currentBriefTimeframe] ? fiberStats[a][currentBriefTimeframe].miles : 0;
            var valB = fiberStats[b][currentBriefTimeframe] ? fiberStats[b][currentBriefTimeframe].miles : 0;
            return valB - valA;
        });

        // Determine max miles for bar scaling
        let maxMiles = sortedVendors.reduce((max, v) => {
            let val = fiberStats[v][currentBriefTimeframe] ? fiberStats[v][currentBriefTimeframe].miles : 0;
            return Math.max(max, val);
        }, 0) || 1;

        sortedVendors.forEach(function(v, idx) {
            var s = fiberStats[v][currentBriefTimeframe];
            // 🧠 FIX: Ensure lifetime shows even if 0 miles, but ignore others if 0
            if (!s || (currentBriefTimeframe !== 'lifetime' && s.miles === 0)) return;

            var subMetric = "";
            if (currentBriefTimeframe === 'lifetime') {
                subMetric = (fiberStats[v].lifetime.fdhCount || 0) + ' Projects Recorded';
            } else if (currentBriefTimeframe === 'today') {
                subMetric = (s.footage || 0).toLocaleString() + ' FT RECORDED';
            } else {
                subMetric = (s.footage || 0).toLocaleString() + ' TOTAL FT';
            }

            let milesVal = s.miles || 0;
            let barWidth = Math.max(2, (milesVal / maxMiles) * 100);
            let rank = idx + 1;
            let rankColor = rank === 1 ? '#fbbf24' : (rank === 2 ? '#94a3b8' : (rank === 3 ? '#92400e' : 'var(--text-muted)'));

            html += `
                <div class="leader-row">
                    <div class="leader-rank" style="border-color:${rankColor}; color:${rank === 1 ? '#92400e' : ''}">${rank}</div>
                    <div class="leader-data">
                        <div class="leader-info-top">
                            <span class="leader-name">${esc(v)}</span>
                            <span class="leader-miles">${milesVal.toLocaleString()}<span style="font-size:9px; margin-left:2px; opacity:0.6;">MI</span></span>
                        </div>
                        <div class="leader-bar-bg">
                            <div class="leader-bar-fill" style="width:${barWidth}%; background:${rank === 1 ? 'var(--accent)' : 'var(--color-critical)'}"></div>
                        </div>
                        <div class="leader-sub-metrics">
                            <span>${esc(subMetric)}</span>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    html += `
            </div>
        </div>
    `;
    return html;
}

function renderCommandView() {
    let host = document.getElementById('command-view');
    if (!host) return;

    let fullFeed = buildUnifiedCommandFeed();
    let feed = fullFeed;
    
    if (currentCommandFilter !== 'all') {
        if (currentCommandFilter === 'db') feed = feed.filter(function(i) { return i.source === 'db'; });
        else if (currentCommandFilter === 'sys') feed = feed.filter(function(i) { return i.source !== 'db'; });
        else if (currentCommandFilter === 'status') feed = feed.filter(function(i) { return i.source === 'db' && i.isStatus; });
        else if (currentCommandFilter === 'date') feed = feed.filter(function(i) { return i.source === 'db' && i.isDate; });
        else if (currentCommandFilter === 'error') feed = feed.filter(function(i) { return i.source === 'error'; });
    }

    if (currentCommandSearch) {
        feed = feed.filter(function(i) {
            return (i.description || '').toLowerCase().includes(currentCommandSearch) ||
                   (i.user || '').toLowerCase().includes(currentCommandSearch) ||
                   (i.title || '').toLowerCase().includes(currentCommandSearch) ||
                   (i.meta || '').toLowerCase().includes(currentCommandSearch);
        });
    }

    let totalDb = fullFeed.filter(function(i) { return i.source === 'db'; }).length;
    let totalStatus = fullFeed.filter(function(i) { return i.source === 'db' && i.isStatus; }).length;
    let totalDates = fullFeed.filter(function(i) { return i.source === 'db' && i.isDate; }).length;
    let totalErrors = fullFeed.filter(function(i) { return i.source === 'error'; }).length;

    var latestLogTs = (window.allGlobalLogs || []).reduce(function(max, l) {
        return Math.max(max, l.timestampObj || 0);
    }, 0);
    lastBriefSeenTimestamp = Math.max(lastBriefSeenTimestamp, latestLogTs);
    localStorage.setItem(LAST_BRIEF_SEEN_KEY, lastBriefSeenTimestamp);
    if (window.updateBriefBadge) window.updateBriefBadge();

    let html = `
        <div class="command-center-layout">
            <div class="command-side-shoulder">
                <div class="command-title-stack">
                    <h1>Command Center</h1>
                    <div class="command-subtitle">Session Audit Trail Active</div>
                </div>
                
                <div class="command-stats-stack">
                    <div class="command-stat-card">
                        <div class="command-stat-val">${fullFeed.length}</div>
                        <div class="command-stat-label">Total Events</div>
                    </div>
                    <div class="command-stat-card">
                        <div class="command-stat-val">${totalStatus}</div>
                        <div class="command-stat-label">Status Shifts</div>
                    </div>
                    <div class="command-stat-card">
                        <div class="command-stat-val">${totalDates}</div>
                        <div class="command-stat-label">Date Edits</div>
                    </div>
                    <div class="command-stat-card" style="${totalErrors > 0 ? 'border-color:var(--color-critical);' : ''}">
                        <div class="command-stat-val" style="${totalErrors > 0 ? 'color:var(--color-critical);' : ''}">${totalErrors}</div>
                        <div class="command-stat-label">System Alerts</div>
                    </div>
                </div>

                ${renderCommandShoulderBrief()}
            </div>

            <div class="command-terminal-wrapper">
                <div class="command-terminal-header">
                    <div style="font-family:var(--font-mono); font-size:11px; font-weight:900; color:var(--text-muted); text-transform:uppercase; opacity:0.5;">OMNI_PMO_STDOUT</div>
                    <div style="font-size:10px; font-weight:900; color:var(--text-muted); opacity:0.3; letter-spacing:1px;">SYNC_STABLE</div>
                </div>
                <div class="command-feed-list">
    `;

    if (feed.length === 0) {
        html += `<div class="digest-panel-empty" style="padding:100px;">NO DATA DETECTED</div>`;
    } else {
        feed.slice(0, 300).forEach(function(item) {
            let tagClass = 'tag-' + item.source;
            let timeStr = item.timeDisplay;
            if (item.timeObj) timeStr = formatDate(new Date(item.timeObj), true);
            
            let messageContent = '';
            if (item.source === 'db') {
                let valHtml = '';
                let currentVal = item.description;
                let previousVal = item.oldValue;

                if (item.isStatus) {
                    if (previousVal && previousVal !== currentVal) {
                        valHtml = `<div class="db-flow-row">${renderStatusPillInCommand(previousVal)}<span class="db-val-arrow">→</span>${renderStatusPillInCommand(currentVal)}</div>`;
                    } else {
                        valHtml = renderStatusPillInCommand(currentVal);
                    }
                } else if (item.isDate) {
                    let formattedPrev = (previousVal && previousVal !== 'null') ? formatDate(previousVal) : 'TBD';
                    let formattedNew = (currentVal && currentVal !== 'null') ? formatDate(currentVal) : 'TBD';
                    if (previousVal && previousVal !== currentVal) {
                        valHtml = `<div class="db-flow-row"><span class="db-val-txt">${esc(formattedPrev)}</span><span class="db-val-arrow">→</span><span class="db-val-txt">${esc(formattedNew)}</span></div>`;
                    } else {
                        valHtml = `<span class="db-val-txt">${esc(formattedNew)}</span>`;
                    }
                } else {
                    if (previousVal && previousVal !== currentVal) {
                        valHtml = `<div class="db-flow-row"><span class="db-val-txt">${esc(previousVal)}</span><span class="db-val-arrow">→</span><span class="db-val-txt">${esc(currentVal)}</span></div>`;
                    } else {
                        valHtml = `<span class="db-val-txt">${esc(currentVal)}</span>`;
                    }
                }

                messageContent = `
                    <div class="command-card-db">
                        <div class="db-log-header">
                            <span class="db-fdh-badge" onclick="inspectFdhHistory('${escJs(item.fdh)}')">${esc(item.fdh)}</span>
                            <span class="db-field-label">${esc(item.changeType)} CHANGED</span>
                        </div>
                        ${valHtml}
                    </div>
                `;
            } else {
                messageContent = `<div class="command-msg">${esc(item.description)}</div>`;
            }
            
            html += `
                <div class="command-row">
                    <div class="command-time" onclick="inspectDateHistory('${escJs(item.timeDisplay)}')">${esc(timeStr)}</div>
                    <div class="command-tag ${tagClass}">${esc(item.meta)}</div>
                    ${messageContent}
                    <div class="command-user" onclick="inspectUserHistory('${escJs(item.user)}')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:10px; height:10px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        ${esc(item.user.split(' ')[0])}
                    </div>
                </div>
            `;
        });
    }

    html += `
                </div>
            </div>
        </div>
    `;

    host.innerHTML = html;
}
</script>

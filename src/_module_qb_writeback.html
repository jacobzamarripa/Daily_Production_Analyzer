<script>
/**
 * FILE: _module_qb_writeback.html
 * PURPOSE: Logic for manual Quickbase API writeback, guards, and feedback.
 */

let pendingWritebacks = [];

/**
 * Fetches pending sync items from staging sheets.
 */
function refreshPendingWritebacks() {
  // TODO: Add backend function to fetch pending rows from 8-Deck_Answers and 6-Committed_Reviews
  // For now, we'll assume a generic backend call returns them.
  google.script.run
    .withSuccessHandler(items => {
      pendingWritebacks = items;
      if (typeof renderOutbox === 'function') renderOutbox();
    })
    .getPendingWritebackItems();
}

/**
 * Commits all pending items that are not in a collision state.
 */
function commitAllPending() {
  const safeItems = (pendingWritebacks || []).filter(i => i.status !== 'collision');
  if (safeItems.length === 0) {
    if (pendingWritebacks.length > 0) {
      alert("All pending items have collisions. Please review and 'FORCE' each item individually.");
    } else {
      alert("No items to sync.");
    }
    return;
  }
  
  if (confirm(`You are about to sync ${safeItems.length} items to Quickbase. Items with collisions will be skipped. Continue?`)) {
    executeWriteback(safeItems);
  }
}

/**
 * Guard overlay for single item commit.
 */
function reviewAndCommitSingle(idx) {
  const item = pendingWritebacks[idx];
  const isCollision = item.status === 'collision';
  
  let confirmMsg = `You are about to write to Quickbase for ${item.fdh}.\n\nFields:\n${Object.entries(item.fields).map(([fid, val]) => `- FID ${fid}: ${val}`).join('\n')}`;
  
  if (isCollision) {
    confirmMsg = `⚠️ DATA OVERWRITE WARNING ⚠️\n\nQuickbase already has data for ${item.fdh}.\n\nCollisions:\n${item.collisions.map(c => `- ${c.field} (FID ${c.fid}): Current [${c.current}] -> New [${c.proposed}]`).join('\n')}\n\nAre you ABSOLUTELY sure you want to overwrite this data?`;
  }

  if (confirm(confirmMsg)) {
    executeWriteback([item], isCollision);
  }
}

/**
 * Calls the backend to execute the PATCH.
 */
function executeWriteback(items, forceOverwrite = false) {
  const payload = items.map(i => ({
    fdh: i.fdh,
    tableId: i.tableId,
    recordId: i.rid,
    fields: i.fields,
    sheetName: i.sheetName,
    rowIdx: i.rowIdx,
    overwriteMode: forceOverwrite
  }));

  showToast(forceOverwrite ? 'Executing Forced Overwrite...' : 'Starting Quickbase Sync...', 'info');

  google.script.run
    .withSuccessHandler(result => {
      displaySyncFeedback(result);
      // We don't just refresh; we might need to preserve collision state if multiple items were synced
      // For now, full refresh is safest.
      refreshPendingWritebacks();
    })
    .withFailureHandler(err => {
      alert('Quickbase Sync Failed: ' + err.message);
    })
    .syncSpecificRecordsToQB(payload);
}

/**
 * Displays immediate feedback modal or toast with success/failure details.
 */
function displaySyncFeedback(result) {
  if (!result.success) {
    alert('Error: ' + result.error);
    return;
  }

  const results = result.results || [];
  const successCount = results.filter(r => r.status === 'success').length;
  const failureCount = results.filter(r => r.status === 'failed').length;
  const collisionCount = results.filter(r => r.status === 'collision').length;
  
  let feedbackMsg = `Sync Operation Finished.\n\nSuccess: ${successCount}\nFailed: ${failureCount}\nCollisions: ${collisionCount}`;
  
  if (collisionCount > 0) {
    // Inject collision data back into the local pendingWritebacks array to update UI state
    results.forEach(res => {
      if (res.status === 'collision') {
        const localItem = pendingWritebacks.find(p => p.fdh === res.fdh);
        if (localItem) {
          localItem.status = 'collision';
          localItem.collisions = res.collisions;
        }
      }
    });
    feedbackMsg += `\n\n${collisionCount} items stopped due to existing data. Review the red items in the queue to Force Overwrite if intended.`;
  }

  if (failureCount > 0) {
    feedbackMsg += '\n\nCritical Errors:\n' + results
      .filter(r => r.status === 'failed')
      .map(r => `- ${r.fdh || r.id}: ${r.error}`)
      .join('\n');
  }

  alert(feedbackMsg);
}
</script>

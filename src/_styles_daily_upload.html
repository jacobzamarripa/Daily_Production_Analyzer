<style>
/* ============================================================
   FILE: _styles_daily_upload.html
   ROLE: Upload Center workspace styles
   ============================================================ */

#upload-workspace {
  display: none;
  flex-direction: column;
  flex: 1;
  min-height: 0;

  overflow: hidden;
}

  display: flex;
}

.upload-shell {

  border-bottom: 1px solid var(--border);
  background: color-mix(in srgb, var(--bg) 96%, #ffffff);
}

.upload-overview {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 12px;
}

.upload-overview-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
}

.upload-overview-titleblock {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.upload-overview-kicker {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.upload-overview-title {
  font-size: 24px;
  line-height: 1.1;
  font-weight: 800;
  color: var(--text-main);

}

.upload-overview-meta {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  white-space: nowrap;
}

.upload-kpi-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.upload-kpi-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 34px;
  padding: 0 12px;
  border-radius: 999px;

  background: color-mix(in srgb, var(--card-bg) 90%, white);
}

.upload-kpi-label {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;

}

.upload-kpi-value {
  font-size: 17px;
  font-weight: 900;
  color: var(--text-main);
}

.upload-kpi-chip.kpi-pending .upload-kpi-value { color: #d97706; }
.upload-kpi-chip.kpi-uploaded .upload-kpi-value { color: #16a34a; }

.upload-missing-panel {
  margin-bottom: 12px;
  border: 1px solid color-mix(in srgb, #8b5cf6 28%, var(--border));
  border-radius: 14px;
  background: color-mix(in srgb, #8b5cf6 4%, white);
  overflow: hidden;
}

.upload-missing-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 12px;
  cursor: pointer;
  user-select: none;
}

.upload-missing-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.upload-missing-chevron {
  font-size: 13px;
  font-weight: 900;
  color: #8b5cf6;
}

.upload-missing-title {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #8b5cf6;
  white-space: nowrap;
}

.upload-missing-summary {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-main);
  min-width: 0;
}

.upload-missing-summary.ok { color: #16a34a; }
.upload-missing-summary.warn { color: #7c3aed; }

.upload-missing-date-picker {
  height: 34px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: color-mix(in srgb, white 92%, var(--bg));
  color: var(--text-main);
  font-size: 12px;
  font-family: inherit;
}

.upload-missing-body {
  display: none;
  border-top: 1px solid color-mix(in srgb, #8b5cf6 18%, var(--border));
  background: color-mix(in srgb, white 96%, #faf5ff);
}

.upload-missing-body.is-open {
  display: block;
}

.upload-missing-rows {
  display: flex;
  flex-direction: column;
}

.upload-missing-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 14px;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 65%, transparent);
}

.upload-missing-row-main {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.upload-missing-vendor {
  font-size: 12px;
  font-weight: 800;
  color: var(--text-main);
}

.upload-missing-meta {
  font-size: 11px;
  color: var(--text-muted);
}

.upload-missing-draft-btn,
.upload-missing-draft-all button {
  height: 30px;
  padding: 0 12px;
  border-radius: 999px;
  border: 1px solid color-mix(in srgb, #8b5cf6 25%, var(--border));
  background: color-mix(in srgb, white 86%, #f5f3ff);
  color: #7c3aed;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
}

.upload-missing-draft-all {
  display: flex;
  justify-content: flex-end;
  padding: 10px 14px;
}

.upload-missing-empty {
  padding: 12px 14px;
  font-size: 12px;
  color: var(--text-muted);
}

.upload-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 0;
  flex-wrap: wrap;
}

.upload-toolbar + .upload-toolbar {
  border-top: 1px solid var(--border);
}

.upload-toolbar-left,
.upload-toolbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.upload-toolbar-left {
  flex: 1;
  min-width: 0;
}

.upload-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.upload-field-label {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.upload-field-search {
  min-width: 280px;
  flex: 1;
}

.upload-select,
.upload-search {
  height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, white 92%, var(--bg));
  color: var(--text-main);
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  padding: 0 12px;
  outline: none;
}

.upload-select {
  min-width: 160px;
}

.upload-search {
  width: 100%;
}

.upload-select:focus,
.upload-search:focus,
.upload-cell-input:focus,
.upload-confirm-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}

.upload-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 36px;
  padding: 0 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, white 82%, var(--card-bg));
  color: var(--text-main);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-family: inherit;
  cursor: pointer;
  transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
}

.upload-btn:hover {
  border-color: var(--accent);
}

.upload-btn.btn-ghost {
  background: transparent;
}

.upload-btn.btn-primary {
  background: color-mix(in srgb, var(--accent) 88%, white);
  border-color: color-mix(in srgb, var(--accent) 88%, white);
  color: #fff;
}

.upload-btn.btn-danger {
  background: #dc2626;
  border-color: #dc2626;
  color: #fff;
}

.upload-btn.is-active {
  background: color-mix(in srgb, var(--accent) 10%, white);
  border-color: color-mix(in srgb, var(--accent) 35%, var(--border));
  color: var(--accent);
}

.upload-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  pointer-events: none;
}

.upload-selection-info {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
}

.upload-table-wrap {
  flex: 1;
  min-height: 0;
  overflow: auto;
  background: color-mix(in srgb, white 96%, var(--bg));
}

.upload-table {
  width: 100%;
  min-width: 1660px;
  border-collapse: separate;
  border-spacing: 0;
  table-layout: auto;
  font-size: 12px;
}

.upload-table thead th {
  position: sticky;
  top: 0;
  z-index: 8;
  padding: 10px 12px;
  border-bottom: 2px solid var(--border);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: left;
  cursor: pointer;
  user-select: none;
  white-space: normal;
  line-height: 1.2;
}

.upload-table th .sort-arrow {
  margin-left: 4px;
  opacity: 0.55;
}

.upload-table th.is-sorted .sort-arrow {
  opacity: 1;
}

.upload-table tbody td {
  padding: 0 12px;
  min-height: 44px;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 80%, transparent);
  background: color-mix(in srgb, white 94%, var(--bg));
  color: var(--text-main);
  vertical-align: middle;
  overflow: visible;
  white-space: normal;
}

.upload-table tbody tr:nth-child(even) td {
  background: color-mix(in srgb, #e2e8f0 28%, white);
}

.upload-table tbody tr:hover td {
  background: color-mix(in srgb, var(--accent) 5%, white);
}

.upload-table tbody tr.row-dirty td {
  background: color-mix(in srgb, #fef3c7 55%, white);
}

.upload-table tbody tr.row-failed td {
  background: color-mix(in srgb, #fee2e2 78%, white);
}

.upload-table tbody tr.row-duplicate td {
  background: color-mix(in srgb, #ffedd5 78%, white);
}

.upload-table tbody tr.row-uploaded td {
  color: color-mix(in srgb, var(--text-main) 42%, white);
}

.upload-table th.col-check,
.upload-table td.col-check {
  position: sticky;
  left: 0;
  z-index: 10;
  width: 52px;
  min-width: 52px;
  max-width: 52px;
  text-align: center;
  padding: 0;
  border-right: 1px solid color-mix(in srgb, var(--border) 85%, transparent);
}

.upload-table th:nth-child(2),
.upload-table td:nth-child(2) {
  position: sticky;
  left: 52px;
  z-index: 7;
  width: 150px;
  min-width: 150px;
  max-width: 150px;
}

.upload-table th:nth-child(3),
.upload-table td:nth-child(3) {
  position: sticky;
  left: 202px;
  z-index: 7;
  width: 200px;
  min-width: 200px;
  max-width: 200px;
}

.upload-table th:nth-child(4),
.upload-table td:nth-child(4) {
  position: sticky;
  left: 402px;
  z-index: 7;
  width: 300px;
  min-width: 300px;
  max-width: 300px;
  border-right: 2px solid color-mix(in srgb, var(--border) 85%, transparent);
}

.upload-table thead th:nth-child(2),
.upload-table thead th:nth-child(3),
.upload-table thead th:nth-child(4) {
  z-index: 9;
}

.upload-table td.col-comments,
.upload-table th.col-comments {
  width: 99%;
  min-width: 320px;
}

.upload-table td.col-comments {
  white-space: normal;
}

.upload-table th.col-lime,
.upload-table td.col-lime {
  min-width: 132px;
}

.upload-table th.col-ug-footage,
.upload-table td.col-ug-footage,
.upload-table th.col-strand,
.upload-table td.col-strand,
.upload-table th.col-fiber,
.upload-table td.col-fiber,
.upload-table th.col-nap,
.upload-table td.col-nap {
  min-width: 110px;
}

.upload-table th.col-teal,
.upload-table td.col-status {
  min-width: 150px;
  white-space: nowrap;
}

.upload-table th.col-dark-navy:not(.col-fdh),
.upload-table td.col-dark-navy:not(.col-fdh):not(.col-comments) {
  min-width: 108px;
}

.upload-row-check {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
}

.upload-cell-readonly {
  display: block;
  padding: 10px 0;
  line-height: 1.35;
  white-space: normal;
  word-break: break-word;
}

.upload-cell-readonly.is-comments {
  min-width: 220px;
}

.upload-td-editable {
  box-shadow: inset 0 1px 0 color-mix(in srgb, #bfdbfe 70%, transparent);
}

.upload-cell-input {
  width: 100%;
  min-height: 32px;
  padding: 0 10px;
  border-radius: 8px;
  border: 1px solid color-mix(in srgb, var(--border) 90%, transparent);
  background: color-mix(in srgb, white 96%, #eff6ff);
  color: var(--text-main);
  font-size: 12px;
  font-family: inherit;
  font-weight: 700;
  outline: none;
  box-sizing: border-box;
}

.upload-cell-input.is-comments {
  min-height: 56px;
  padding: 8px 10px;
  resize: vertical;
}

.upload-bool-cell {
  text-align: center;
  vertical-align: middle;
}

.du-bool-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 44px;
}

.du-bool-checkbox {
  width: 18px;
  height: 18px;
  margin: 0;
  accent-color: #16a34a;
  cursor: pointer;
}

.du-bool-checkbox.is-readonly {
  cursor: default;
  opacity: 0.9;
}

.upload-status-badge {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 0 10px;
  border-radius: 999px;
  border: 1px solid transparent;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
}

.upload-status-badge.status-pending {
  background: color-mix(in srgb, #f59e0b 16%, white);
  border-color: color-mix(in srgb, #f59e0b 34%, var(--border));
  color: #b45309;
}

.upload-status-badge.status-uploaded {
  background: color-mix(in srgb, #22c55e 16%, white);
  border-color: color-mix(in srgb, #22c55e 34%, var(--border));
  color: #15803d;
}

.upload-status-badge.status-failed {
  background: color-mix(in srgb, #ef4444 16%, white);
  border-color: color-mix(in srgb, #ef4444 34%, var(--border));
  color: #b91c1c;
}

.upload-status-badge.status-duplicate {
  background: color-mix(in srgb, #f97316 16%, white);
  border-color: color-mix(in srgb, #f97316 34%, var(--border));
  color: #c2410c;
}

.upload-status-badge.status-skipped {
  background: color-mix(in srgb, #94a3b8 16%, white);
  border-color: color-mix(in srgb, #94a3b8 34%, var(--border));
  color: #475569;
}

.upload-lock-note {
  display: inline-block;
  margin-left: 6px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
}

.upload-lock-note.editable {
  color: var(--accent);
}

.upload-dirty-dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  margin-right: 6px;
  border-radius: 999px;
  background: #f59e0b;
  vertical-align: middle;
}

.upload-history-section {
  border-top: 1px solid var(--border);
  background: color-mix(in srgb, white 92%, var(--bg));
}

.upload-history-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 20px;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  cursor: pointer;
}

.upload-history-toggle svg {
  transition: transform 120ms ease;
}

.upload-history-toggle.is-open svg {
  transform: rotate(90deg);
}

.upload-history-list {
  display: none;
  padding: 0 20px 18px;
}

.upload-history-list.is-open {
  display: block;
}

.upload-history-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
  font-size: 12px;
}

.upload-history-row:last-child {
  border-bottom: none;
}

.upload-history-empty {
  padding: 0 0 12px;
  font-size: 12px;
  color: var(--text-muted);
}

.upload-history-ts {
  min-width: 120px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
}

.upload-history-counts {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}

.upload-history-count {
  font-size: 11px;
  font-weight: 700;
}

.upload-history-count.success { color: #15803d; }
.upload-history-count.failed { color: #b91c1c; }
.upload-history-count.skipped { color: var(--text-muted); }

.upload-history-batch {
  font-size: 10px;
  color: var(--text-muted);
  font-family: ui-monospace, SFMono-Regular, monospace;
}

.upload-history-dry-badge {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  padding: 0 8px;
  border-radius: 999px;
  border: 1px solid color-mix(in srgb, #8b5cf6 30%, var(--border));
  background: color-mix(in srgb, #ede9fe 70%, white);
  color: #7c3aed;
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.upload-empty {
  padding: 40px 20px;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
}

.upload-modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(15, 23, 42, 0.55);
}

.upload-modal-overlay.visible {
  display: flex;
}

.upload-modal {
  width: min(760px, 100%);
  max-height: min(88vh, 920px);
  display: flex;
  flex-direction: column;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, white 94%, var(--card-bg));
  box-shadow: 0 40px 90px rgba(15, 23, 42, 0.24);
  overflow: hidden;
}

.upload-modal-header,
.upload-modal-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.upload-modal-footer {
  justify-content: flex-end;
  border-top: 1px solid var(--border);
  border-bottom: none;
}

.upload-modal-title {
  font-size: 16px;
  font-weight: 800;
  color: var(--text-main);
}

.upload-modal-close {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
}

.upload-modal-body {
  flex: 1;
  overflow: auto;
  padding: 18px 20px;
}

.upload-modal-copy,
.upload-modal-subhead {
  margin: 0 0 12px;
  font-size: 12px;
  color: var(--text-main);
}

.upload-modal-copy.strong {
  font-size: 13px;
  font-weight: 700;
}

.upload-modal-subhead {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.upload-preview-note {
  margin-bottom: 12px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  font-size: 12px;
  font-weight: 700;
}

.upload-preview-note.ok {
  background: color-mix(in srgb, #dcfce7 78%, white);
  color: #15803d;
}

.upload-preview-note.warn {
  background: color-mix(in srgb, #ffedd5 82%, white);
  color: #c2410c;
}

.upload-preview-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.upload-preview-table th,
.upload-preview-table td {
  padding: 8px 10px;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
  text-align: left;
  vertical-align: top;
}

.upload-preview-table th {
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.upload-preview-table tr.is-dupe td {
  background: color-mix(in srgb, #ffedd5 82%, white);
}

.upload-preview-ok {
  font-size: 11px;
  font-weight: 700;
  color: #15803d;
}

.upload-preview-warn {
  font-size: 11px;
  font-weight: 700;
  color: #c2410c;
}

.upload-confirm-input {
  width: 100%;
  height: 44px;
  padding: 0 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: color-mix(in srgb, white 96%, #eff6ff);
  color: var(--text-main);
  font-size: 14px;
  font-family: ui-monospace, SFMono-Regular, monospace;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-align: center;
  box-sizing: border-box;
}

.upload-result-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

.upload-result-value {
  font-size: 28px;
  font-weight: 900;
}

.upload-result-value.success { color: #15803d; }
.upload-result-value.failed { color: #b91c1c; }
.upload-result-value.duplicate { color: #c2410c; }

.upload-result-label {
  font-size: 10px;

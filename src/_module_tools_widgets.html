<script>
// ============================================================
// FILE: _module_tools_widgets.html
// ROLE: Owns the calculator and calendar widget runtime, including drag, persistence, and inline control handlers.
// DEPENDS ON: WebApp.html markup
// DEPENDED ON BY: WebApp.html inline handlers and global keydown listener
// MOBILE NOTES: Uses pointer drag, viewport clamping, and fixed widget positioning that remain desktop-biased.
// AGENT NOTES: Keep the public surface limited to toggleWidget, changeMonth, calcNum, and calcOp.
// ============================================================
(function() {
  // STATE: CALC_WIDGET_SESSION_KEY
  // READS: calculator widget persistence
  // WRITES: none
  // EXTRACT WITH: saveCalcWidgetPosition, loadCalcWidgetPosition
  // WORKSTREAM 3 RISK: Low
  var CALC_WIDGET_SESSION_KEY = 'calcWidgetPosition';

  // STATE: CALC_WIDGET_VIEWPORT_MARGIN
  // READS: calculator widget clamping
  // WRITES: none
  // EXTRACT WITH: clampToolWidgetPosition
  // WORKSTREAM 3 RISK: Low
  var CALC_WIDGET_VIEWPORT_MARGIN = 20;

  // STATE: calcWidgetDragState
  // READS: calculator drag move/end
  // WRITES: calculator drag lifecycle
  // EXTRACT WITH: calculator widget helpers
  // WORKSTREAM 3 RISK: Low
  var calcWidgetDragState = null;

  // STATE: currentCalDate
  // READS: calendar render
  // WRITES: calendar month navigation
  // EXTRACT WITH: renderCalendar, changeMonth
  // WORKSTREAM 3 RISK: Low
  var currentCalDate = new Date();
  var CALENDAR_MAX_VISIBLE_EVENTS = 3;
  var activeCalendarFilters = { start: true, complete: true, ofs: true };
  var CALC_THEME_STORAGE_KEY = 'calcTheme';
  var CALC_THEMES = ['classic', 'field', 'terminal'];
  var CALC_THEME_LABELS = { classic: 'CLASSIC', field: 'FIELD', terminal: 'TERMINAL' };
  var CALC_DISPLAY_MEDIUM_THRESHOLD = 13;
  var CALC_DISPLAY_SMALL_THRESHOLD = 17;
  var CALC_DISPLAY_TINY_THRESHOLD = 22;

  // STATE: calViewMode / currentCalWeekStart
  // READS: calendar render routing
  // WRITES: setCalViewMode, changeWeek, jumpToToday
  var calViewMode = 'month'; // 'month' | 'week'
  var currentCalWeekStart = null; // always a Monday-anchored Sunday Date

  // STATE: calcState
  // READS: calculator render/update
  // WRITES: calculator input/operators
  // EXTRACT WITH: calcNum, calcOp, updateCalc
  // WORKSTREAM 3 RISK: Low
  var calcState = '';
  var calcTheme = loadCalcTheme();

  // Popover timers
  var calPopoverShowTimer = null;
  var calPopoverHideTimer = null;

  // ─────────────────────────────────────────────────
  // WIDGET DRAG + POSITION HELPERS
  // ─────────────────────────────────────────────────

  function clampToolWidgetPosition(widget, left, top) {
      if (!widget) return { left: 0, top: 0 };
      var maxLeft = Math.max(CALC_WIDGET_VIEWPORT_MARGIN, window.innerWidth - widget.offsetWidth - CALC_WIDGET_VIEWPORT_MARGIN);
      var maxTop = Math.max(CALC_WIDGET_VIEWPORT_MARGIN, window.innerHeight - widget.offsetHeight - CALC_WIDGET_VIEWPORT_MARGIN);
      return {
          left: Math.min(Math.max(CALC_WIDGET_VIEWPORT_MARGIN, left), maxLeft),
          top: Math.min(Math.max(CALC_WIDGET_VIEWPORT_MARGIN, top), maxTop)
      };
  }

  function applyToolWidgetPosition(widget, left, top) {
      if (!widget) return;
      var pos = clampToolWidgetPosition(widget, left, top);
      widget.style.left = pos.left + 'px';
      widget.style.top = pos.top + 'px';
  }

  function saveCalcWidgetPosition(left, top) {
      try {
          sessionStorage.setItem(CALC_WIDGET_SESSION_KEY, JSON.stringify({ left: left, top: top }));
      } catch (e) {}
  }

  function loadCalcWidgetPosition() {
      try {
          var raw = sessionStorage.getItem(CALC_WIDGET_SESSION_KEY);
          if (!raw) return null;
          var parsed = JSON.parse(raw);
          if (!parsed || typeof parsed.left !== 'number' || typeof parsed.top !== 'number') return null;
          return parsed;
      } catch (e) {
          return null;
      }
  }

  function loadCalcTheme() {
      try {
          var storedTheme = sessionStorage.getItem(CALC_THEME_STORAGE_KEY);
          if (CALC_THEMES.indexOf(storedTheme) !== -1) return storedTheme;
      } catch (e) {}
      return CALC_THEMES[0];
  }

  function saveCalcTheme(theme) {
      try {
          sessionStorage.setItem(CALC_THEME_STORAGE_KEY, theme);
      } catch (e) {}
  }

  function positionWidgetFromTrigger(widget, triggerEl) {
      if (!widget || !triggerEl) return;
      var rect = triggerEl.getBoundingClientRect();
      var topPos = rect.bottom + 12;
      var leftPos = rect.left + (rect.width / 2) - (widget.offsetWidth / 2);
      applyToolWidgetPosition(widget, leftPos, topPos);
  }

  function restoreCalcWidgetPosition(widget, triggerEl) {
      if (!widget) return;
      var saved = loadCalcWidgetPosition();
      if (saved) {
          applyToolWidgetPosition(widget, saved.left, saved.top);
          return;
      }
      if (triggerEl) {
          positionWidgetFromTrigger(widget, triggerEl);
          return;
      }
      applyToolWidgetPosition(widget, window.innerWidth - widget.offsetWidth - 32, 88);
  }

  var activeDragWidgetId = null;
  var widgetDragStates = {};

  function startWidgetDrag(e, id) {
      var widget = document.getElementById(id);
      if (!widget || !widget.classList.contains('open')) return;
      if (e.target && e.target.closest('.tool-close')) return;
      
      var point = e.touches && e.touches[0] ? e.touches[0] : e;
      var rect = widget.getBoundingClientRect();
      
      widgetDragStates[id] = {
          pointerId: e.pointerId,
          offsetX: point.clientX - rect.left,
          offsetY: point.clientY - rect.top
      };
      
      activeDragWidgetId = id;
      widget.classList.add('dragging');
      if (typeof e.preventDefault === 'function') e.preventDefault();
  }

  function moveWidgetDrag(e) {
      if (!activeDragWidgetId) return;
      var state = widgetDragStates[activeDragWidgetId];
      if (state.pointerId !== undefined && e.pointerId !== undefined && e.pointerId !== state.pointerId) return;
      
      var widget = document.getElementById(activeDragWidgetId);
      if (!widget) return;
      
      var nextLeft = e.clientX - state.offsetX;
      var nextTop = e.clientY - state.offsetY;
      applyToolWidgetPosition(widget, nextLeft, nextTop);
      if (typeof e.preventDefault === 'function') e.preventDefault();
  }

  function endWidgetDrag() {
      if (!activeDragWidgetId) return;
      var widget = document.getElementById(activeDragWidgetId);
      if (widget) {
          widget.classList.remove('dragging');
          var left = parseFloat(widget.style.left);
          var top = parseFloat(widget.style.top);
          if (!isNaN(left) && !isNaN(top)) {
              if (activeDragWidgetId === 'calc-widget') saveCalcWidgetPosition(left, top);
          }
      }
      activeDragWidgetId = null;
  }

  function syncWidgetsToViewport() {
      if (typeof syncCalcWidgetToViewport === 'function') syncCalcWidgetToViewport();
  }

  function initCalcWidgetDrag() {
      var calcHeader = document.getElementById('calc-widget-header');
      if (calcHeader) {
          calcHeader.addEventListener('pointerdown', function(e) { startWidgetDrag(e, 'calc-widget'); });
      }

      window.addEventListener('pointermove', moveWidgetDrag);
      window.addEventListener('pointerup', endWidgetDrag);
      window.addEventListener('pointercancel', endWidgetDrag);
      window.addEventListener('resize', syncWidgetsToViewport);
  }

  // ─────────────────────────────────────────────────
  // TOGGLE + KEYBOARD
  // ─────────────────────────────────────────────────

  function toggleWidget(id, event) {
      ['cal-widget', 'calc-widget'].forEach(function(w) {
          var el = document.getElementById(w);
          if (el && w !== id) {
              el.classList.remove('open');
              if (w === 'calc-widget') endWidgetDrag();
          }
      });
      var widget = document.getElementById(id);
      if (!widget) return;
      var isOpen = widget.classList.toggle('open');

      if (id === 'calc-widget' && !isOpen) {
          endWidgetDrag();
      }

      if (isOpen && id === 'calc-widget') {
          restoreCalcWidgetPosition(widget, event && event.currentTarget ? event.currentTarget : null);
      } else if (isOpen && event && event.currentTarget) {
          positionWidgetFromTrigger(widget, event.currentTarget);
      }

      if (id === 'cal-widget') {
          if (isOpen) {
              renderCalendar();
              initCalendarKeyboard();
          } else {
              hideCalEventPopover();
              removeCalendarKeyboard();
          }
      }
  }

  function initCalendarKeyboard() {
      document.addEventListener('keydown', onCalKeydown);
  }

  function removeCalendarKeyboard() {
      document.removeEventListener('keydown', onCalKeydown);
  }

  function onCalKeydown(e) {
      var calWidget = document.getElementById('cal-widget');
      if (!calWidget || !calWidget.classList.contains('open')) return;
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;

      if (e.key === 'ArrowLeft') {
          e.preventDefault();
          calNavPrev();
      } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          calNavNext();
      } else if (e.key === 't' || e.key === 'T') {
          e.preventDefault();
          jumpToToday();
      } else if (e.key === 'Escape') {
          toggleWidget('cal-widget');
      }
  }

  // ─────────────────────────────────────────────────
  // VIEW MODE + NAVIGATION
  // ─────────────────────────────────────────────────

  function setCalViewMode(mode) {
      calViewMode = mode;
      document.querySelectorAll('.cal-view-btn').forEach(function(btn) {
          btn.classList.toggle('is-active', btn.getAttribute('data-view') === mode);
      });
      var isHorizon = (mode === 'horizon');
      var grid = document.getElementById('cal-grid');
      var controls = document.querySelector('#cal-widget .cal-controls');
      var horizonWrapper = document.getElementById('cal-horizon-wrapper');
      if (grid) grid.style.display = isHorizon ? 'none' : '';
      if (controls) controls.style.display = isHorizon ? 'none' : '';
      if (horizonWrapper) horizonWrapper.style.display = isHorizon ? '' : 'none';
      renderCalendar();
  }

  function getWeekStart(date) {
      var d = new Date(date);
      var day = d.getDay(); // 0 = Sun
      d.setDate(d.getDate() - day);
      d.setHours(0, 0, 0, 0);
      return d;
  }

  function jumpToToday() {
      currentCalDate = new Date();
      currentCalWeekStart = getWeekStart(currentCalDate);
      renderCalendar();
  }

  function calNavPrev() {
      if (calViewMode === 'week') { changeWeek(-1); } else { changeMonth(-1); }
  }

  function calNavNext() {
      if (calViewMode === 'week') { changeWeek(1); } else { changeMonth(1); }
  }

  function changeMonth(dir) {
      currentCalDate.setMonth(currentCalDate.getMonth() + dir);
      renderCalendar();
  }

  function changeWeek(dir) {
      if (!currentCalWeekStart) currentCalWeekStart = getWeekStart(currentCalDate);
      currentCalWeekStart.setDate(currentCalWeekStart.getDate() + dir * 7);
      renderCalendar();
  }

  // ─────────────────────────────────────────────────
  // CALENDAR DATA HELPERS
  // ─────────────────────────────────────────────────

  function escapeCalendarHtml(value) {
      return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
  }

  function escapeCalendarJs(value) {
      return String(value == null ? '' : value)
          .replace(/\\/g, '\\\\')
          .replace(/'/g, "\\'");
  }

  function getCalendarItems() {
      if (typeof getActiveQueueItems === 'function') {
          var activeItems = getActiveQueueItems();
          if (Array.isArray(activeItems) && activeItems.length) return activeItems;
      }
      if (Array.isArray(filteredItems) && filteredItems.length) return filteredItems;
      if (Array.isArray(allActionItems) && allActionItems.length) return allActionItems;
      return [];
  }

  var today = new Date();
  today.setHours(0, 0, 0, 0);

  function getCalendarMilestones(items, year, month) {
      var typeOrder = { start: 0, complete: 1, ofs: 2 };
      var counters = { start: 0, complete: 0, ofs: 0 };
      var grouped = {};

      function pushMilestone(item, rawDate, type, suffix, pillClass) {
          var parsed = safeDate(rawDate);
          if (!parsed || isNaN(parsed.getTime())) return;
          if (parsed.getUTCFullYear() !== year || parsed.getUTCMonth() !== month) return;

          var day = parsed.getUTCDate();
          var milestoneDate = new Date(year, month, day);
          milestoneDate.setHours(0, 0, 0, 0);
          var isOverdue = (type === 'complete' || type === 'ofs') && milestoneDate < today;

          var milestone = {
              fdh: item && item.fdh ? String(item.fdh) : 'UNKNOWN',
              day: day,
              type: type,
              suffix: suffix,
              pillClass: pillClass,
              isOverdue: isOverdue,
              item: item
          };

          if (!grouped[day]) grouped[day] = [];
          grouped[day].push(milestone);
          counters[type]++;
      }

      (items || []).forEach(function(item) {
          if (!item) return;
          pushMilestone(item, item.cxStart, 'start', 'START', 'cal-event-pill-start');
          pushMilestone(item, item.cxEnd, 'complete', 'COMPLETE', 'cal-event-pill-complete');
          pushMilestone(item, getEffectiveOfsRaw(item), 'ofs', 'OFS', 'cal-event-pill-ofs');
      });

      Object.keys(grouped).forEach(function(dayKey) {
          grouped[dayKey].sort(function(a, b) {
              if (typeOrder[a.type] !== typeOrder[b.type]) return typeOrder[a.type] - typeOrder[b.type];
              return a.fdh.localeCompare(b.fdh);
          });
      });

      return {
          grouped: grouped,
          counts: counters,
          total: counters.start + counters.complete + counters.ofs
      };
  }

  function getMilestonesForDateRange(items, startDate, endDate) {
      var typeOrder = { start: 0, complete: 1, ofs: 2 };
      var grouped = {};

      function pushMilestone(item, rawDate, type, suffix, pillClass) {
          var parsed = safeDate(rawDate);
          if (!parsed || isNaN(parsed.getTime())) return;
          var d = new Date(parsed.getUTCFullYear(), parsed.getUTCMonth(), parsed.getUTCDate());
          d.setHours(0, 0, 0, 0);
          if (d < startDate || d > endDate) return;

          var key = d.toISOString().slice(0, 10);
          var milestoneDate = d;
          var isOverdue = (type === 'complete' || type === 'ofs') && milestoneDate < today;

          var milestone = {
              fdh: item && item.fdh ? String(item.fdh) : 'UNKNOWN',
              type: type,
              suffix: suffix,
              pillClass: pillClass,
              isOverdue: isOverdue,
              item: item
          };

          if (!grouped[key]) grouped[key] = [];
          grouped[key].push(milestone);
      }

      (items || []).forEach(function(item) {
          if (!item) return;
          pushMilestone(item, item.cxStart, 'start', 'START', 'cal-event-pill-start');
          pushMilestone(item, item.cxEnd, 'complete', 'COMPLETE', 'cal-event-pill-complete');
          pushMilestone(item, getEffectiveOfsRaw(item), 'ofs', 'OFS', 'cal-event-pill-ofs');
      });

      Object.keys(grouped).forEach(function(key) {
          grouped[key].sort(function(a, b) {
              if (typeOrder[a.type] !== typeOrder[b.type]) return typeOrder[a.type] - typeOrder[b.type];
              return a.fdh.localeCompare(b.fdh);
          });
      });

      return grouped;
  }

  function getFilteredCalendarMilestones(milestoneData) {
      var grouped = {};
      var counters = { start: 0, complete: 0, ofs: 0 };

      Object.keys((milestoneData && milestoneData.grouped) || {}).forEach(function(dayKey) {
          var dayEvents = (milestoneData.grouped[dayKey] || []).filter(function(evt) {
              return !!activeCalendarFilters[evt.type];
          });
          if (!dayEvents.length) return;
          grouped[dayKey] = dayEvents;
          dayEvents.forEach(function(evt) {
              counters[evt.type] = (counters[evt.type] || 0) + 1;
          });
      });

      return {
          grouped: grouped,
          counts: counters,
          total: counters.start + counters.complete + counters.ofs
      };
  }

  function filterGroupedMilestones(grouped) {
      var filtered = {};
      Object.keys(grouped || {}).forEach(function(key) {
          var evts = (grouped[key] || []).filter(function(evt) { return !!activeCalendarFilters[evt.type]; });
          if (evts.length) filtered[key] = evts;
      });
      return filtered;
  }

  function updateCalendarSummary(summary) {
      var totalEl = document.getElementById('cal-total-count');
      var startEl = document.getElementById('cal-start-count');
      var completeEl = document.getElementById('cal-complete-count');
      var ofsEl = document.getElementById('cal-ofs-count');
      if (totalEl) totalEl.innerText = String(summary.total || 0);
      if (startEl) startEl.innerText = String(summary.counts && summary.counts.start || 0);
      if (completeEl) completeEl.innerText = String(summary.counts && summary.counts.complete || 0);
      if (ofsEl) ofsEl.innerText = String(summary.counts && summary.counts.ofs || 0);
  }

  function syncCalendarFilterUi() {
      var filterToClass = {
          start: 'cal-legend-pill-start',
          complete: 'cal-legend-pill-complete',
          ofs: 'cal-legend-pill-ofs'
      };
      Object.keys(filterToClass).forEach(function(key) {
          var el = document.querySelector('.' + filterToClass[key]);
          if (!el) return;
          el.classList.toggle('is-active', !!activeCalendarFilters[key]);
      });
  }

  function clearCalendarMilestoneFilters() {
      activeCalendarFilters = { start: true, complete: true, ofs: true };
      syncCalendarFilterUi();
      renderCalendar();
  }

  function toggleCalendarFilter(type) {
      if (!Object.prototype.hasOwnProperty.call(activeCalendarFilters, type)) return;
      var nextValue = !activeCalendarFilters[type];
      var activeCount = Object.keys(activeCalendarFilters).filter(function(key) { return !!activeCalendarFilters[key]; }).length;
      if (!nextValue && activeCount === 1) return;
      activeCalendarFilters[type] = nextValue;
      syncCalendarFilterUi();
      renderCalendar();
  }

  function openCalendarProject(fdh) {
      var target = (filteredItems || []).find(function(item) { return String(item.fdh || '') === String(fdh || ''); })
          || (allActionItems || []).find(function(item) { return String(item.fdh || '') === String(fdh || ''); });
      if (!target) return;

      hideCalEventPopover();
      var widget = document.getElementById('cal-widget');
      if (widget) widget.classList.remove('open');
      if (typeof switchWorkspaceView === 'function') switchWorkspaceView('detail');
      openPane(target, document.getElementById('card-' + target.fdh) || null);
  }

  // ─────────────────────────────────────────────────
  // PILL HTML BUILDER
  // ─────────────────────────────────────────────────

  function buildEventPillHtml(evt) {
      var chipLabel = escapeCalendarHtml(evt.fdh);
      var fullLabel = escapeCalendarHtml(evt.fdh + ' · ' + evt.suffix);
      var overdueCls = evt.isOverdue ? ' overdue' : '';
      return '<button class="cal-event-pill ' + evt.pillClass + overdueCls + '" ' +
          'onmouseenter="scheduleCalPopover(\'' + escapeCalendarJs(evt.fdh) + '\', this)" ' +
          'onmouseleave="scheduleCalPopoverHide()" ' +
          'title="' + fullLabel + '">' + chipLabel + '</button>';
  }

  // ─────────────────────────────────────────────────
  // MONTH VIEW RENDER
  // ─────────────────────────────────────────────────

  function renderCalendarMonth() {
      var y = currentCalDate.getFullYear(), m = currentCalDate.getMonth();
      var labelEl = document.getElementById('cal-month-year');
      if (labelEl) labelEl.innerText = new Date(y, m).toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();

      var firstDay = new Date(y, m, 1).getDay();
      var daysInMonth = new Date(y, m + 1, 0).getDate();
      var grid = document.getElementById('cal-grid');
      if (!grid) return;

      grid.className = 'cal-grid';

      var sourceItems = getCalendarItems();
      var milestoneData = getCalendarMilestones(sourceItems, y, m);
      var filteredMilestoneData = getFilteredCalendarMilestones(milestoneData);
      syncCalendarFilterUi();
      updateCalendarSummary(filteredMilestoneData);

      var DAY_NAMES = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
      var html = '';
      DAY_NAMES.forEach(function(d, i) {
          var isWknd = (i === 0 || i === 6);
          html += '<div class="cal-day-header' + (isWknd ? ' weekend' : '') + '">' + d + '</div>';
      });

      for (var i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';

      var todayObj = new Date();
      for (var d = 1; d <= daysInMonth; d++) {
          var dayOfWeek = new Date(y, m, d).getDay();
          var isToday = (d === todayObj.getDate() && m === todayObj.getMonth() && y === todayObj.getFullYear());
          var isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
          var dayEvents = filteredMilestoneData.grouped[d] || [];
          var visibleEvents = dayEvents.slice(0, CALENDAR_MAX_VISIBLE_EVENTS);
          var overflowEvents = dayEvents.slice(CALENDAR_MAX_VISIBLE_EVENTS);
          var density = Math.min(5, dayEvents.length);

          var classes = 'cal-cell';
          if (isToday) classes += ' today';
          if (isWeekend) classes += ' weekend';

          var eventsHtml = visibleEvents.map(buildEventPillHtml).join('');
          if (overflowEvents.length) {
              var overflowTitle = escapeCalendarHtml(overflowEvents.map(function(evt) { return evt.fdh + ' · ' + evt.suffix; }).join(', '));
              eventsHtml += '<div class="cal-more" title="' + overflowTitle + '">+' + overflowEvents.length + ' more</div>';
          }

          html += '<div class="' + classes + '" data-density="' + density + '">' +
              '<div class="cal-cell-day"><span class="cal-cell-day-number">' + d + '</span></div>' +
              '<div class="cal-cell-events">' + eventsHtml + '</div>' +
              '</div>';
      }
      grid.innerHTML = html;
  }

  // ─────────────────────────────────────────────────
  // WEEK VIEW RENDER
  // ─────────────────────────────────────────────────

  function renderCalendarWeek() {
      if (!currentCalWeekStart) currentCalWeekStart = getWeekStart(currentCalDate);

      var weekStart = new Date(currentCalWeekStart);
      var weekEnd = new Date(weekStart);
      weekEnd.setDate(weekEnd.getDate() + 6);

      var labelEl = document.getElementById('cal-month-year');
      if (labelEl) {
          var startStr = weekStart.toLocaleString('default', { month: 'short', day: 'numeric' });
          var endStr = weekEnd.toLocaleString('default', { month: 'short', day: 'numeric', year: 'numeric' });
          labelEl.innerText = (startStr + ' – ' + endStr).toUpperCase();
      }

      var grid = document.getElementById('cal-grid');
      if (!grid) return;

      grid.className = 'cal-grid week-view';

      var sourceItems = getCalendarItems();
      var grouped = getMilestonesForDateRange(sourceItems, weekStart, weekEnd);
      var filteredGrouped = filterGroupedMilestones(grouped);
      syncCalendarFilterUi();

      var todayObj = new Date();
      todayObj.setHours(0, 0, 0, 0);

      var html = '';
      var DAY_NAMES_SHORT = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

      for (var i = 0; i < 7; i++) {
          var colDate = new Date(weekStart);
          colDate.setDate(colDate.getDate() + i);
          colDate.setHours(0, 0, 0, 0);

          var isToday = (colDate.getTime() === todayObj.getTime());
          var isWeekend = (colDate.getDay() === 0 || colDate.getDay() === 6);
          var dateKey = colDate.toISOString().slice(0, 10);
          var dayEvents = filteredGrouped[dateKey] || [];

          var colClasses = 'cal-week-col';
          if (isToday) colClasses += ' today';
          if (isWeekend) colClasses += ' weekend';

          var eventsHtml = dayEvents.map(buildEventPillHtml).join('');

          html += '<div class="' + colClasses + '">' +
              '<div class="cal-week-day-header">' +
                  '<span class="cal-week-day-name">' + DAY_NAMES_SHORT[colDate.getDay()] + '</span>' +
                  '<span class="cal-week-day-num">' + colDate.getDate() + '</span>' +
              '</div>' +
              '<div class="cal-week-events">' + (eventsHtml || '') + '</div>' +
              '</div>';
      }

      grid.innerHTML = html;

      // Update summary for week
      var counts = { start: 0, complete: 0, ofs: 0 };
      Object.values(filteredGrouped).forEach(function(evts) {
          evts.forEach(function(evt) { if (counts[evt.type] !== undefined) counts[evt.type]++; });
      });
      updateCalendarSummary({ counts: counts, total: counts.start + counts.complete + counts.ofs });
  }

  // ─────────────────────────────────────────────────
  // NAV BADGE — global overdue count across all items
  // ─────────────────────────────────────────────────

  function computeGlobalOverdueCount() {
      var items = getCalendarItems();
      var count = 0;
      var now = new Date();
      now.setHours(0, 0, 0, 0);
      (items || []).forEach(function(item) {
          if (!item) return;
          var dates = [
              { raw: item.cxEnd, type: 'complete' },
              { raw: getEffectiveOfsRaw(item), type: 'ofs' }
          ];
          dates.forEach(function(d) {
              if (!d.raw) return;
              var parsed = safeDate(d.raw);
              if (!parsed || isNaN(parsed.getTime())) return;
              var ms = new Date(parsed.getUTCFullYear(), parsed.getUTCMonth(), parsed.getUTCDate());
              ms.setHours(0, 0, 0, 0);
              if (ms < now) count++;
          });
      });
      return count;
  }

  function updateCalNavBadge(count) {
      var badges = document.querySelectorAll('.cal-nav-badge');
      badges.forEach(function(b) {
          if (count > 0) {
              b.style.display = '';
              b.textContent = count > 99 ? '99+' : String(count);
          } else {
              b.style.display = 'none';
              b.textContent = '';
          }
      });
  }

  // ─────────────────────────────────────────────────
  // TODAY SPOTLIGHT BANNER
  // ─────────────────────────────────────────────────

  function updateCalSpotlight(items) {
      var strip = document.getElementById('cal-spotlight');
      if (!strip) return;
      var now = new Date();
      now.setHours(0, 0, 0, 0);
      var in7 = new Date(now);
      in7.setDate(in7.getDate() + 7);

      var todayItems = [], overdueItems = [], nextUpItem = null, nextUpDays = Infinity;

      (items || []).forEach(function(item) {
          if (!item) return;
          var checks = [
              { raw: item.cxEnd, type: 'complete' },
              { raw: getEffectiveOfsRaw(item), type: 'ofs' },
              { raw: item.cxStart, type: 'start' }
          ];
          checks.forEach(function(c) {
              if (!c.raw) return;
              var parsed = safeDate(c.raw);
              if (!parsed || isNaN(parsed.getTime())) return;
              var ms = new Date(parsed.getUTCFullYear(), parsed.getUTCMonth(), parsed.getUTCDate());
              ms.setHours(0, 0, 0, 0);
              if (ms.getTime() === now.getTime()) {
                  todayItems.push({ fdh: item.fdh, type: c.type });
              } else if ((c.type === 'complete' || c.type === 'ofs') && ms < now) {
                  overdueItems.push({ fdh: item.fdh, type: c.type });
              } else if (ms > now && ms <= in7) {
                  var days = Math.round((ms - now) / 86400000);
                  if (days < nextUpDays) {
                      nextUpDays = days;
                      nextUpItem = { fdh: item.fdh, type: c.type, days: days };
                  }
              }
          });
      });

      var html = '';
      if (todayItems.length) {
          var chips = todayItems.slice(0, 4).map(function(t) {
              return '<button class="cal-spotlight-chip" onclick="openCalendarProject(\'' + escapeCalendarJs(t.fdh) + '\')">' +
                  escapeCalendarHtml(t.fdh) + ' <span class="cal-spotlight-chip-type">' + t.type.toUpperCase() + '</span></button>';
          }).join('');
          var more = todayItems.length > 4 ? '<span class="cal-spotlight-more">+' + (todayItems.length - 4) + '</span>' : '';
          html = '<div class="cal-spotlight-row spotlight-today"><span class="cal-spotlight-label">TODAY</span>' + chips + more + '</div>';
      } else if (overdueItems.length) {
          var chips = overdueItems.slice(0, 3).map(function(t) {
              return '<button class="cal-spotlight-chip overdue" onclick="openCalendarProject(\'' + escapeCalendarJs(t.fdh) + '\')">' +
                  escapeCalendarHtml(t.fdh) + '</button>';
          }).join('');
          var more = overdueItems.length > 3 ? '<span class="cal-spotlight-more">+' + (overdueItems.length - 3) + ' more</span>' : '';
          html = '<div class="cal-spotlight-row spotlight-overdue"><span class="cal-spotlight-label">' + overdueItems.length + ' OVERDUE</span>' + chips + more + '</div>';
      } else if (nextUpItem) {
          html = '<div class="cal-spotlight-row spotlight-next"><span class="cal-spotlight-label">NEXT UP</span>' +
              '<button class="cal-spotlight-chip" onclick="openCalendarProject(\'' + escapeCalendarJs(nextUpItem.fdh) + '\')">' +
              escapeCalendarHtml(nextUpItem.fdh) + '</button>' +
              '<span class="cal-spotlight-days">in ' + nextUpItem.days + ' day' + (nextUpItem.days !== 1 ? 's' : '') + '</span>' +
              '</div>';
      }

      if (html) {
          strip.innerHTML = html;
          strip.style.display = '';
      } else {
          strip.style.display = 'none';
      }
  }

  // ─────────────────────────────────────────────────
  // HORIZON VIEW — 30-day pipeline lookahead
  // ─────────────────────────────────────────────────

  function renderCalendarHorizon() {
      var grid = document.getElementById('cal-grid');
      if (grid) grid.style.display = 'none';
      var wrapper = document.getElementById('cal-horizon-wrapper');
      if (!wrapper) {
          wrapper = document.createElement('div');
          wrapper.id = 'cal-horizon-wrapper';
          wrapper.className = 'cal-horizon-wrapper';
          var calWidget = document.getElementById('cal-widget');
          if (calWidget) {
              var popover = document.getElementById('cal-hover-popover');
              calWidget.insertBefore(wrapper, popover || null);
          }
      }
      wrapper.style.display = '';

      var items = getCalendarItems();
      var now = new Date();
      now.setHours(0, 0, 0, 0);
      var horizon = new Date(now);
      horizon.setDate(horizon.getDate() + 120);

      var overdue = [], finalStretch = [], pipeline = [], beyond = [];

      function addMilestone(item, rawDate, type, suffix, pillClass) {
          var parsed = safeDate(rawDate);
          if (!parsed || isNaN(parsed.getTime())) return;
          var ms = new Date(parsed.getUTCFullYear(), parsed.getUTCMonth(), parsed.getUTCDate());
          ms.setHours(0, 0, 0, 0);
          if (ms > horizon) return;
          var entry = {
              date: ms,
              dateLabel: fmtDateShort(ms),
              type: type,
              suffix: suffix,
              pillClass: pillClass,
              fdh: item && item.fdh ? String(item.fdh) : 'UNKNOWN',
              vendor: item ? (item.vendor || item.vendorName || '—') : '—',
              stage: item ? (item.stage || item.status || '—') : '—',
              item: item
          };
          if ((type === 'complete' || type === 'ofs') && ms < now) {
              overdue.push(entry);
          } else if (ms >= now) {
              var daysOut = Math.round((ms - now) / 86400000);
              if (daysOut <= 14) finalStretch.push(entry);
              else if (daysOut <= 60) pipeline.push(entry);
              else beyond.push(entry);
          }
      }

      (items || []).forEach(function(item) {
          if (!item) return;
          addMilestone(item, item.cxStart, 'start', 'START', 'cal-event-pill-start');
          addMilestone(item, item.cxEnd, 'complete', 'COMPLETE', 'cal-event-pill-complete');
          addMilestone(item, getEffectiveOfsRaw(item), 'ofs', 'OFS', 'cal-event-pill-ofs');
      });

      function sortByDate(a, b) { return a.date - b.date; }
      overdue.sort(function(a, b) { return b.date - a.date; }); // most recent overdue first
      finalStretch.sort(sortByDate);
      pipeline.sort(sortByDate);
      beyond.sort(sortByDate);

      function fmtDateShort(d) {
          var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
          return months[d.getMonth()] + ' ' + d.getDate();
      }

      function buildRow(entry) {
          var typeLabels = { start: 'START', complete: 'COMPLETE', ofs: 'OFS' };
          var label = typeLabels[entry.type] || entry.suffix;
          return '<div class="cal-horizon-row" onclick="openCalendarProject(\'' + escapeCalendarJs(entry.fdh) + '\')">' +
              '<span class="cal-horizon-date">' + escapeCalendarHtml(entry.dateLabel) + '</span>' +
              '<span class="cal-horizon-type ' + entry.pillClass + '">' + label + '</span>' +
              '<span class="cal-horizon-fdh">' + escapeCalendarHtml(entry.fdh) + '</span>' +
              '<span class="cal-horizon-vendor">' + escapeCalendarHtml(entry.vendor) + '</span>' +
              '<span class="cal-horizon-open">Open →</span>' +
              '</div>';
      }

      function buildSection(title, entries, tierClass) {
          if (!entries.length) return '';
          var rowsHtml = entries.map(buildRow).join('');
          return '<div class="cal-horizon-section ' + tierClass + '">' +
              '<div class="cal-horizon-section-title">' + escapeCalendarHtml(title) + '<span class="cal-horizon-section-count">' + entries.length + '</span></div>' +
              rowsHtml +
              '</div>';
      }

      var html = '';
      html += buildSection('OVERDUE', overdue, 'tier-overdue');
      html += buildSection('FINAL STRETCH · ≤14 DAYS', finalStretch, 'tier-final');
      html += buildSection('PIPELINE · 15–60 DAYS', pipeline, 'tier-pipeline');
      if (beyond.length) {
          html += '<div class="cal-horizon-section tier-beyond">' +
              '<details>' +
              '<summary class="cal-horizon-section-title">BEYOND · 61–120 DAYS<span class="cal-horizon-section-count">' + beyond.length + '</span></summary>' +
              beyond.map(buildRow).join('') +
              '</details>' +
              '</div>';
      }
      if (!html) {
          html = '<div class="cal-horizon-empty">No milestones in the next 120 days.</div>';
      }
      wrapper.innerHTML = html;

      var label = document.getElementById('cal-month-year');
      if (label) {
          var od = overdue.length;
          label.textContent = 'HORIZON' + (od > 0 ? ' · ' + od + ' OVERDUE' : '');
      }
  }

  function renderCalendar() {
      hideCalEventPopover();
      var items = getCalendarItems();
      var overdueCount = computeGlobalOverdueCount();
      updateCalNavBadge(overdueCount);
      updateCalSpotlight(items);
      if (calViewMode === 'horizon') {
          renderCalendarHorizon();
      } else if (calViewMode === 'week') {
          renderCalendarWeek();
      } else {
          renderCalendarMonth();
      }
  }

  // ─────────────────────────────────────────────────
  // HOVER POPOVER
  // ─────────────────────────────────────────────────

  function scheduleCalPopover(fdh, anchorEl) {
      clearTimeout(calPopoverHideTimer);
      clearTimeout(calPopoverShowTimer);
      calPopoverShowTimer = setTimeout(function() {
          showCalEventPopover(fdh, anchorEl);
      }, 200);
  }

  function scheduleCalPopoverHide() {
      clearTimeout(calPopoverShowTimer);
      calPopoverHideTimer = setTimeout(function() {
          var popover = document.getElementById('cal-hover-popover');
          if (popover && !popover.matches(':hover')) hideCalEventPopover();
      }, 120);
  }

  function showCalEventPopover(fdh, anchorEl) {
      var item = (filteredItems || []).find(function(i) { return String(i.fdh || '') === String(fdh || ''); })
          || (allActionItems || []).find(function(i) { return String(i.fdh || '') === String(fdh || ''); });

      var popover = document.getElementById('cal-hover-popover');
      if (!popover) return;

      var vendorName = item ? (item.vendor || item.vendorName || '—') : '—';
      var statusLabel = item ? (item.stage || item.status || '—') : '—';
      var cxStart = item ? (item.cxStart || null) : null;
      var cxEnd = item ? (item.cxEnd || null) : null;
      var ofsRaw = item ? getEffectiveOfsRaw(item) : null;

      var startDate = safeDate(cxStart);
      var endDate = safeDate(cxEnd);
      var ofsDate = safeDate(ofsRaw);

      var pct = 0;
      if (startDate && endDate && endDate - startDate > 0) {
          pct = Math.max(0, Math.min(100, Math.round(((new Date() - startDate) / (endDate - startDate)) * 100)));
      }

      function fmtD(raw) {
          if (!raw) return 'TBD';
          var d = safeDate(raw);
          if (!d || isNaN(d.getTime())) return 'TBD';
          return d.toLocaleDateString('default', { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
      }

      var cxRange = cxStart || cxEnd
          ? (fmtD(cxStart) + (cxEnd ? ' → ' + fmtD(cxEnd) : ''))
          : 'TBD';

      popover.innerHTML =
          '<div class="cal-popover-fdh">' + escapeCalendarHtml(fdh) + '</div>' +
          '<div class="cal-popover-vendor">' + escapeCalendarHtml(vendorName) + '</div>' +
          '<div class="cal-popover-row"><span>STATUS</span><span class="cal-popover-status-pill">' + escapeCalendarHtml(statusLabel) + '</span></div>' +
          '<div class="cal-popover-divider"></div>' +
          '<div class="cal-popover-row"><span>CX WINDOW</span><span>' + escapeCalendarHtml(cxRange) + '</span></div>' +
          (ofsDate ? '<div class="cal-popover-row"><span>OFS</span><span>' + escapeCalendarHtml(fmtD(ofsRaw)) + '</span></div>' : '') +
          (pct > 0 ? '<div class="cal-popover-progress"><div class="cal-popover-progress-fill" style="width:' + pct + '%"></div></div>' : '') +
          '<button class="cal-popover-open-btn" onclick="openCalendarProject(\'' + escapeCalendarJs(fdh) + '\')">Open Project →</button>';

      popover.style.display = 'block';

      popover.addEventListener('mouseenter', function() { clearTimeout(calPopoverHideTimer); });
      popover.addEventListener('mouseleave', function() { scheduleCalPopoverHide(); });

      positionCalPopover(popover, anchorEl);
  }

  function hideCalEventPopover() {
      clearTimeout(calPopoverShowTimer);
      clearTimeout(calPopoverHideTimer);
      var popover = document.getElementById('cal-hover-popover');
      if (popover) popover.style.display = 'none';
  }

  function positionCalPopover(popoverEl, anchorEl) {
      if (!popoverEl || !anchorEl) return;
      var rect = anchorEl.getBoundingClientRect();
      var ph = popoverEl.offsetHeight || 180;
      var pw = popoverEl.offsetWidth || 260;

      var top = rect.top - ph - 10;
      var left = rect.left + rect.width / 2 - pw / 2;

      if (top < 8) top = rect.bottom + 10;
      var maxLeft = window.innerWidth - pw - 12;
      if (left < 8) left = 8;
      if (left > maxLeft) left = maxLeft;

      popoverEl.style.top = top + 'px';
      popoverEl.style.left = left + 'px';
  }

  // ─────────────────────────────────────────────────
  // CALCULATOR
  // ─────────────────────────────────────────────────

  function calcNum(n) {
      if (calcState === 'Err') calcState = '';
      calcState += n;
      updateCalc();
  }

  function calcBackspace() {
      if (calcState === 'Err') {
          calcState = '';
      } else if (calcState.length > 0) {
          calcState = calcState.slice(0, -1);
      }
      updateCalc();
  }

  function applyCalcTheme() {
      var widget = document.getElementById('calc-widget');
      var themeLabel = document.getElementById('calc-theme-label');
      if (widget) widget.setAttribute('data-calc-theme', calcTheme);
      if (themeLabel) themeLabel.textContent = CALC_THEME_LABELS[calcTheme] || calcTheme.toUpperCase();
  }

  function cycleCalcTheme() {
      var currentIndex = CALC_THEMES.indexOf(calcTheme);
      calcTheme = CALC_THEMES[(currentIndex + 1) % CALC_THEMES.length];
      saveCalcTheme(calcTheme);
      applyCalcTheme();
  }

  function calcOp(op) {
      if (op === 'clr') { calcState = ''; }
      else if (op === 'backspace') {
          calcBackspace();
          return;
      }
      else if (op === '=') {
          try {
              var result = new Function('return ' + calcState.replace(/×/g, '*').replace(/÷/g, '/'))();
              calcState = String(Math.round(result * 100) / 100);
          } catch(e) { calcState = 'Err'; }
      }
      else if (['drill-days', 'jet-days', 'ae-days', 'splice-days'].includes(op)) {
          try {
              var val = Number(new Function('return ' + calcState.replace(/×/g, '*').replace(/÷/g, '/'))());
              if (op === 'drill-days')  calcState = String(Math.ceil(val / 450));
              if (op === 'jet-days')    calcState = String(Math.ceil(val / 5000));
              if (op === 'ae-days')     calcState = String(Math.ceil(val / 5000));
              if (op === 'splice-days') calcState = String(Math.ceil(val / 5));
          } catch(e) { calcState = 'Err'; }
      }
      else {
          if (calcState === 'Err') calcState = '';
          calcState += op;
      }
      updateCalc();
  }

  function updateCalc() {
      var disp = document.getElementById('calc-display');
      var nextValue = calcState || '0';
      if (!disp) return;

      disp.value = nextValue;
      disp.classList.remove('calc-display-medium', 'calc-display-small', 'calc-display-tiny');
      if (nextValue.length >= CALC_DISPLAY_TINY_THRESHOLD) {
          disp.classList.add('calc-display-tiny');
      } else if (nextValue.length >= CALC_DISPLAY_SMALL_THRESHOLD) {
          disp.classList.add('calc-display-small');
      } else if (nextValue.length >= CALC_DISPLAY_MEDIUM_THRESHOLD) {
          disp.classList.add('calc-display-medium');
      }

      if (typeof disp.setSelectionRange === 'function') {
          var valueLength = disp.value.length;
          disp.setSelectionRange(valueLength, valueLength);
      }
      disp.scrollLeft = disp.scrollWidth;
  }

  // ─────────────────────────────────────────────────
  // PUBLIC SURFACE
  // ─────────────────────────────────────────────────

  window.toggleWidget = toggleWidget;
  window.changeMonth = changeMonth;
  window.changeWeek = changeWeek;
  window.calNavPrev = calNavPrev;
  window.calNavNext = calNavNext;
  window.jumpToToday = jumpToToday;
  window.setCalViewMode = setCalViewMode;
  window.calcNum = calcNum;
  window.calcOp = calcOp;
  window.calcBackspace = calcBackspace;
  window.cycleCalcTheme = cycleCalcTheme;
  window.openCalendarProject = openCalendarProject;
  window.toggleCalendarFilter = toggleCalendarFilter;
  window.clearCalendarMilestoneFilters = clearCalendarMilestoneFilters;
  window.scheduleCalPopover = scheduleCalPopover;
  window.scheduleCalPopoverHide = scheduleCalPopoverHide;
  window.focusQueueFromCalendar = focusQueueFromCalendar;
  // ─────────────────────────────────────────────────
  // QUEUE BRIDGE — Focus Queue from calendar period
  // ─────────────────────────────────────────────────

  function focusQueueFromCalendar() {
      var items = getCalendarItems();
      var fdhSet = new Set();
      var label = '';

      if (calViewMode === 'horizon') {
          // Horizon: focus overdue + final-stretch (≤14 days)
          var now = new Date();
          now.setHours(0, 0, 0, 0);
          var cutoff = new Date(now);
          cutoff.setDate(cutoff.getDate() + 14);
          (items || []).forEach(function(item) {
              if (!item || !item.fdh) return;
              var dates = [
                  { raw: item.cxEnd, type: 'complete' },
                  { raw: getEffectiveOfsRaw(item), type: 'ofs' }
              ];
              dates.forEach(function(d) {
                  if (!d.raw) return;
                  var parsed = safeDate(d.raw);
                  if (!parsed || isNaN(parsed.getTime())) return;
                  var ms = new Date(parsed.getUTCFullYear(), parsed.getUTCMonth(), parsed.getUTCDate());
                  ms.setHours(0, 0, 0, 0);
                  if (ms <= cutoff) fdhSet.add(String(item.fdh));
              });
          });
          label = 'Horizon Focus';
      } else if (calViewMode === 'week') {
          var ws = currentCalWeekStart || getWeekStart(new Date());
          var we = new Date(ws);
          we.setDate(we.getDate() + 6);
          var grouped = getMilestonesForDateRange(items, ws, we);
          Object.values(grouped).forEach(function(evts) {
              (evts || []).forEach(function(evt) { if (evt.fdh) fdhSet.add(String(evt.fdh)); });
          });
          var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          label = monthNames[ws.getMonth()] + ' ' + ws.getDate() + '–' + we.getDate();
      } else {
          // Month view
          var y = currentCalDate ? currentCalDate.getFullYear() : new Date().getFullYear();
          var m = currentCalDate ? currentCalDate.getMonth() : new Date().getMonth();
          var data = getCalendarMilestones(items, y, m);
          Object.values((data && data.grouped) || {}).forEach(function(evts) {
              (evts || []).forEach(function(evt) { if (evt.fdh) fdhSet.add(String(evt.fdh)); });
          });
          var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          label = monthNames[m] + ' ' + y;
      }

      if (!fdhSet.size) {
          if (typeof showToast === 'function') showToast('No milestones in this period', 'info');
          return;
      }

      if (typeof applyCalendarFocus === 'function') {
          applyCalendarFocus(fdhSet, label);
      }
      // Close the calendar widget
      var widget = document.getElementById('cal-widget');
      if (widget) widget.classList.remove('open');
  }

  window.renderCalendar = renderCalendar;

  applyCalcTheme();
  initCalcWidgetDrag();
})();
</script>

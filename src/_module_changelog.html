<script>
// ============================================================
// FILE: _module_changelog.html
// ROLE: Owns changelog list rendering for the Review Hub while leaving payload hydration in the WebApp shell.
// DEPENDS ON: WebApp.html markup, _utils_shared.html
// DEPENDED ON BY: WebApp.html changelog controls and bootstrap payload flow
// MOBILE NOTES: Renders into a desktop-biased panel with dense controls and inline desktop spacing assumptions.
// AGENT NOTES: Keep `allGlobalLogs` global in WebApp.html until bootstrap state moves; do not pull payload hydration into this file.
// ============================================================
function renderChangeLog() {
    let list = getEl('changelog-list');
    if (!list) return;
    let search = (getEl('changelog-search')?.value || '').toLowerCase();
    let timeFilter = getEl('changelog-time')?.value || 'ALL';
    let userFilter = getEl('changelog-user')?.value || 'ALL';
    let currentFdhOnly = getEl('changelog-current-fdh')?.checked;

    let logsToRender = allGlobalLogs.slice();

    if (currentFdhOnly && typeof currentActiveItem !== 'undefined' && currentActiveItem) {
        logsToRender = logsToRender.filter(log => String(log.fdh || '') === String(currentActiveItem.fdh || ''));
    }

    if (timeFilter !== 'ALL') {
        let cutoffTime = Date.now() - (parseInt(timeFilter, 10) * 60 * 60 * 1000);
        logsToRender = logsToRender.filter(log => Number(log.timestampObj || 0) >= cutoffTime);
    }

    if (userFilter !== 'ALL') {
        logsToRender = logsToRender.filter(log => String(log.user || '') === userFilter);
    }

    if (search) {
        logsToRender = logsToRender.filter(log =>
            String(log.fdh || '').toLowerCase().includes(search) ||
            String(log.user || '').toLowerCase().includes(search) ||
            String(log.type || '').toLowerCase().includes(search)
        );
    }

    logsToRender.sort((a, b) => Number(b.timestampObj || 0) - Number(a.timestampObj || 0));

    if (logsToRender.length === 0) {
        list.innerHTML = `<div class="empty-msg" style="margin-top:20px; font-size:11px;">No activity matches current filters.</div>`;
        return;
    }

    let html = '';
    logsToRender.forEach(log => {
        let typeIcon = '📝';
        let t = String(log.type || '').toUpperCase();
        if (t.includes('REVIEW')) typeIcon = '👁️';
        if (t.includes('SYNC')) typeIcon = '🔄';
        if (t.includes('UPDATE')) typeIcon = '🛠️';
        if (t.includes('COMMIT')) typeIcon = '✅';
        if (t.includes('FLAG')) typeIcon = '🚩';

        let cleanVal = String(log.val ?? '').replace(/(?: \d{2}:\d{2}:\d{2} GMT.*)/, '');
        html += `
        <div class="log-row-dense" onclick="selectItemForNav('${escJs(String(log.fdh || ''))}')">
            <div class="log-row-type">${typeIcon}</div>
            <div class="log-row-main">
                <div class="log-row-top">
                    <span class="log-row-fdh">${esc(log.fdh)}</span>
                    <span class="log-row-time">${formatDate(log.timestampObj ? new Date(Number(log.timestampObj)) : log.time, true)}</span>
                </div>
                <div class="log-row-val">${esc(cleanVal)}</div>
            </div>
            <div class="log-row-user">${esc(String(log.user || '').split(' ')[0])}</div>
        </div>`;
    });

    list.innerHTML = html;
}
</script>

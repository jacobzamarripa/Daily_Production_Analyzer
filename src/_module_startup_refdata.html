<script>
// ============================================================
// FILE: _module_startup_refdata.html | ROLE: Startup selector flow and ref-data age indicator helpers
// DEPENDS ON: _state_payload.html, _utils_shared.html, _module_router.html, _module_gantt.html
// DEPENDED ON BY: _module_webapp_core.html, _module_queue_state.html, WebApp.html startup overlay
// ============================================================
let startupTimer;
let startupCountdown = 6;

function showStartupSelector() {
    if (window.innerWidth <= 480) {
        document.body.classList.remove('mobile-detail-open');
        return completeStartup('detail');
    }
    if (typeof openSignal === 'function') {
        openSignal();
    } else {
        completeStartup('detail');
    }
}

function completeStartup(mode) {
    clearInterval(startupTimer);
    startupTimer = null;
    const overlay = getEl('startup-overlay');
    if (overlay) overlay.classList.remove('visible');
    document.body.classList.remove('dashboard-active');

    if (mode === 'gantt') {
        openGanttView();
        return;
    }

    const startupMode = (mode === 'slide' || mode === 'digest') ? 'detail' : mode;
    switchWorkspaceView(startupMode);
    if (mode === 'slide') {
        setTimeout(() => toggleDetailFace('slide'), 80);
    }
}

function updateRefDataIndicator() {
    let badge = getEl('nav-ref-age');
    let paneSpan = getEl('p-ref-data');
    if (!globalRefDataDate) {
        if (badge) badge.style.display = 'none';
        if (paneSpan) {
            paneSpan.textContent = 'REF DATA: -';
            paneSpan.style.color = 'var(--text-muted)';
        }
        return;
    }

    // Parse the stored date and compute days old using safeDate helper.
    let refDate = safeDate(globalRefDataDate);
    let today = new Date();
    today.setHours(0, 0, 0, 0);
    
    // safeDate returns UTC date; we need to compare it to today's local date for "days old"
    // to keep it simple, we strip time from both and calculate the difference.
    let daysOld = 999;
    if (refDate) {
        let d = new Date(refDate.getUTCFullYear(), refDate.getUTCMonth(), refDate.getUTCDate());
        daysOld = Math.round((today - d) / 86400000);
    }

    let color;
    let bgColor;
    let borderColor;
    let label;
    if (daysOld <= 0) {
        color = '#166534';
        bgColor = '#dcfce7';
        borderColor = '#86efac';
        label = 'FRESH';
    } else if (daysOld === 1) {
        color = '#854d0e';
        bgColor = '#fef9c3';
        borderColor = '#fde047';
        label = '1 DAY OLD';
    } else if (daysOld === 2) {
        color = '#9a3412';
        bgColor = '#ffedd5';
        borderColor = '#fb923c';
        label = `${daysOld} DAYS OLD`;
    } else {
        color = '#7f1d1d';
        bgColor = '#fee2e2';
        borderColor = '#f87171';
        label = `${daysOld} DAYS OLD - STALE`;
    }

    let displayDate = globalRefDataDate;
    if (badge) {
        badge.style.display = 'inline-flex';
        badge.style.color = color;
        badge.style.background = bgColor;
        badge.style.borderColor = borderColor;
        const isTablet = document.documentElement.classList.contains('surface-ipad')
            || window.matchMedia('(pointer: coarse) and (min-width: 769px) and (min-height: 600px)').matches;
        const shortLabel = daysOld <= 0 ? '✓' : `${daysOld}d`;
        badge.textContent = isTablet ? `Ref: ${shortLabel}` : `REF DATA: ${label}`;
    }
    if (paneSpan) {
        paneSpan.textContent = `REF DATA: ${displayDate} (${label})`;
        paneSpan.style.color = color;
    }
}
</script>
